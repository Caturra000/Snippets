<!DOCTYPE html>
<html dir="ltr" lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新标签页</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --tile-bg: transparent;
            --tile-hover-bg: #e8e8e9;
            --tile-icon-bg: rgb(225, 227, 225);
            --tile-icon-bg-hover: rgb(210, 213, 210);
            --dialog-bg: #ffffff;
            --dialog-overlay: rgba(0, 0, 0, 0.4);
            --input-bg: #f1f3f4;
            --input-border: #dadce0;
            --input-focus-border: #1a73e8;
            --btn-primary-bg: #1a73e8;
            --btn-primary-text: #ffffff;
            --btn-primary-hover: #1765cc;
            --btn-secondary-bg: transparent;
            --btn-secondary-text: #1a73e8;
            --btn-secondary-hover: rgba(26, 115, 232, 0.08);
            --toast-bg: #323232;
            --toast-text: #ffffff;
            --divider-color: #e0e0e0;
            --scrollbar-thumb: #c1c1c1;
            --scrollbar-track: transparent;
            --expand-icon-bg: #e8eaed;
            --expand-icon-bg-hover: #d2d4d7;
            
            /* 三点按钮隐蔽色 */
            --more-btn-color: #dadce0; 
            --more-btn-hover-color: #5f6368;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1e1e1e;
                --text-primary: #e8eaed;
                --text-secondary: #9aa0a6;
                --tile-bg: transparent;
                --tile-hover-bg: #3c4043;
                --tile-icon-bg: #303134;
                --tile-icon-bg-hover: #4e5154;
                --dialog-bg: #2d2f31;
                --dialog-overlay: rgba(0, 0, 0, 0.6);
                --input-bg: #303134;
                --input-border: #5f6368;
                --input-focus-border: #8ab4f8;
                --btn-primary-bg: #8ab4f8;
                --btn-primary-text: #202124;
                --btn-primary-hover: #a8c7fa;
                --btn-secondary-bg: transparent;
                --btn-secondary-text: #8ab4f8;
                --btn-secondary-hover: rgba(138, 180, 248, 0.12);
                --toast-bg: #e8eaed;
                --toast-text: #202124;
                --divider-color: #3c4043;
                --scrollbar-thumb: #5f6368;
                --scrollbar-track: transparent;
                --expand-icon-bg: #303134;
                --expand-icon-bg-hover: #3c4043;
                
                /* 黑暗模式三点按钮隐蔽色 */
                --more-btn-color: #3c4043;
                --more-btn-hover-color: #9aa0a6;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            background-attachment: fixed;
            background-color: var(--bg-color);
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            height: 100%;
            overflow: auto;
            scroll-behavior: smooth;
        }

        body {
            align-items: center;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Google Sans', Roboto, 'Noto Sans SC', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html::-webkit-scrollbar {
            width: 8px;
        }
        html::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        html::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 0; /* 直角 */
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: 720px;
            padding: 0 16px;
        }

        .grid-wrapper {
            width: 100%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 112px);
            gap: 0;
            justify-content: center;
            justify-items: center;
            width: 100%;
            padding: 8px 0;
        }

        @media (min-width: 1100px) {
            .grid {
                grid-template-columns: repeat(5, 112px);
                gap: 0;
                max-width: 820px;
                margin: 0 auto;
            }
            .main-container {
                max-width: 880px;
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(3, 112px);
                gap: 0;
            }
            .main-container {
                padding: 0 8px;
            }
        }

        @media (max-width: 400px) {
            .grid {
                grid-template-columns: repeat(2, 112px);
                gap: 0;
            }
        }

        .tile {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 112px;
            padding: 16px 8px 12px;
            border-radius: 0; /* 直角 */
            cursor: pointer;
            background-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            outline: none;
            text-decoration: none;
            color: var(--text-primary);
            /* 取消过渡动画 */
        }

        .tile:hover {
            background-color: var(--tile-hover-bg);
            /* 移除了阴影 */
        }

        .tile:focus-visible {
            background-color: var(--tile-hover-bg);
            box-shadow: inset 0 0 0 2px rgba(26, 115, 232, 0.5);
            outline: none;
        }

        .tile.dragging {
            opacity: 0.5;
            box-shadow: none;
        }

        .tile.drag-over {
            background-color: var(--tile-hover-bg);
            box-shadow: inset 0 0 0 2px #1a73e8;
            border-radius: 0; /* 直角 */
        }

        .tile-icon-container {
            position: relative;
            width: 48px;
            height: 48px;
            border-radius: 50%; /* 图标圆圈保留 */
            background-color: var(--tile-icon-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            flex-shrink: 0;
            overflow: hidden;
            /* 取消动画 */
        }

        .tile:hover .tile-icon-container {
            background-color: var(--tile-icon-bg-hover);
        }

        .tile-icon-container img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            pointer-events: none;
        }

        .tile-icon-container .fallback-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #d2d4d7;
            color: #5f6368;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        @media (prefers-color-scheme: dark) {
            .tile-icon-container .fallback-icon {
                background-color: #5f6368;
                color: #e8eaed;
            }
        }

        .tile-title {
            text-align: center;
            font-size: 13px;
            line-height: 1.35;
            color: var(--text-primary);
            word-break: break-word;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            max-width: 100%;
            letter-spacing: 0.01em;
        }

        .tile-actions {
            position: absolute;
            top: 4px;
            right: 4px;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            /* 取消了透明度的过渡动画 */
        }

        .tile:hover .tile-actions {
            opacity: 1;
            pointer-events: auto;
        }

        .tile-action-btn {
            width: 24px;
            height: 24px;
            border-radius: 0; /* 直角 */
            border: none;
            background: transparent; /* 无背景 */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: none; /* 无阴影 */
            padding: 0;
            color: var(--more-btn-color); /* 极度隐蔽色 */
            flex-shrink: 0;
            /* 无过渡动画 */
        }

        .tile-action-btn:hover {
            color: var(--more-btn-hover-color); /* hover时才变得清晰 */
            background: transparent;
        }

        .tile-action-btn svg {
            width: 18px;
            height: 18px;
            pointer-events: none;
        }

        .add-tile {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 112px;
            padding: 16px 8px 12px;
            border-radius: 0; /* 直角 */
            cursor: pointer;
            background-color: transparent;
            border: none;
            font-family: inherit;
            color: var(--text-secondary);
            outline: none;
            -webkit-appearance: none;
            /* 无动画 */
        }

        .add-tile:hover {
            background-color: var(--tile-hover-bg);
            box-shadow: none;
        }

        .add-tile:focus-visible {
            background-color: var(--tile-hover-bg);
            box-shadow: inset 0 0 0 2px rgba(26, 115, 232, 0.5);
            outline: none;
        }

        .add-tile .tile-icon-container {
            background-color: var(--tile-icon-bg);
        }

        .add-tile:hover .tile-icon-container {
            background-color: var(--tile-icon-bg-hover);
        }

        .add-tile .plus-icon {
            color: var(--text-secondary);
        }

        .add-tile:hover .plus-icon {
            color: var(--text-primary);
        }

        .add-tile .tile-title {
            color: var(--text-secondary);
        }

        .toggle-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 4px;
        }

        .toggle-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 10px 8px;
            border-radius: 0; /* 直角 */
            cursor: pointer;
            background-color: transparent;
            border: none;
            font-family: inherit;
            color: var(--text-secondary);
            font-size: 12px;
            outline: none;
            gap: 6px;
            -webkit-appearance: none;
            min-width: 70px;
        }

        .toggle-btn:hover {
            background-color: var(--tile-hover-bg);
            color: var(--text-primary);
        }

        .toggle-btn:focus-visible {
            background-color: var(--tile-hover-bg);
            box-shadow: inset 0 0 0 2px rgba(26, 115, 232, 0.5);
            outline: none;
        }

        .toggle-btn .toggle-icon-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--expand-icon-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-btn:hover .toggle-icon-circle {
            background-color: var(--expand-icon-bg-hover);
        }

        .toggle-btn svg {
            width: 18px;
            height: 18px;
            color: var(--text-secondary);
        }

        .toggle-btn:hover svg {
            color: var(--text-primary);
        }

        .dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dialog-overlay);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 弹窗遮罩保留动画比较自然 */
            animation: fadeIn 0.18s ease;
        }

        .dialog-overlay.closing {
            animation: fadeOut 0.15s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .dialog {
            background: var(--dialog-bg);
            border-radius: 0; /* 直角 */
            padding: 24px 28px 20px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.25), 0 8px 16px rgba(0, 0, 0, 0.15);
            animation: slideIn 0.22s cubic-bezier(0.22, 0.61, 0.36, 1);
            position: relative;
        }

        .dialog-overlay.closing .dialog {
            animation: slideOut 0.15s cubic-bezier(0.4, 0, 1, 1) forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes slideOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(10px) scale(0.97); }
        }

        .dialog-title {
            font-size: 17px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 20px;
            letter-spacing: 0.01em;
        }

        .dialog-field {
            margin-bottom: 16px;
        }

        .dialog-field label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.02em;
            text-transform: none;
        }

        .dialog-field input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--input-border);
            border-radius: 0; /* 直角 */
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
            outline: none;
            font-family: inherit;
            letter-spacing: 0.01em;
        }

        .dialog-field input:focus {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
        }

        @media (prefers-color-scheme: dark) {
            .dialog-field input:focus {
                box-shadow: 0 0 0 2px rgba(138, 180, 248, 0.2);
            }
        }

        .dialog-field input::placeholder {
            color: #9aa0a6;
        }

        .dialog-buttons {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .dialog-buttons.has-remove {
            justify-content: space-between;
        }
        
        .right-buttons {
            display: flex;
            gap: 10px;
        }

        .dialog-btn {
            padding: 10px 20px;
            border-radius: 0; /* 直角 */
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            outline: none;
            font-family: inherit;
            letter-spacing: 0.01em;
            -webkit-appearance: none;
        }

        .dialog-btn:focus-visible {
            box-shadow: inset 0 0 0 2px rgba(26, 115, 232, 0.5);
        }

        .dialog-btn.cancel-btn {
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
        }

        .dialog-btn.cancel-btn:hover {
            background: var(--btn-secondary-hover);
        }

        .dialog-btn.save-btn {
            background: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            font-weight: 500;
            min-width: 72px;
            text-align: center;
        }

        .dialog-btn.save-btn:hover {
            background: var(--btn-primary-hover);
        }

        .dialog-btn.save-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            pointer-events: none;
        }

        .dialog-btn.remove-dialog-btn {
            background: transparent;
            color: var(--text-secondary);
            padding: 10px 16px;
        }

        .dialog-btn.remove-dialog-btn:hover {
            background: #fce8e6;
            color: #d93025;
        }

        @media (prefers-color-scheme: dark) {
            .dialog-btn.remove-dialog-btn:hover {
                background: #5c1e1a;
                color: #f28b82;
            }
        }

        .toast-container {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: var(--toast-bg);
            color: var(--toast-text);
            padding: 12px 20px;
            border-radius: 0; /* 直角 */
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
            animation: toastIn 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
            max-width: 90vw;
            white-space: nowrap;
        }

        .toast.removing {
            animation: toastOut 0.22s ease forwards;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(16px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(8px) scale(0.92); }
        }

        .toast-undo-btn {
            background: none;
            border: none;
            color: #8ab4f8;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 0; /* 直角 */
            font-family: inherit;
            letter-spacing: 0.01em;
            white-space: nowrap;
            -webkit-appearance: none;
        }

        .toast-undo-btn:hover {
            background: rgba(138, 180, 248, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            .toast-undo-btn {
                color: #202124;
                background: rgba(0, 0, 0, 0.08);
            }
            .toast-undo-btn:hover {
                background: rgba(0, 0, 0, 0.18);
            }
        }

        .hidden {
            display: none !important;
        }

        .tile-link {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            text-decoration: none;
            color: transparent;
            border-radius: 0; /* 直角 */
            outline: none;
        }

        .tile-link:focus-visible {
            box-shadow: inset 0 0 0 2px rgba(26, 115, 232, 0.5);
        }

        .tile-actions {
            z-index: 5;
        }

        .tile-link {
            z-index: 1;
        }
        .tile-icon-container,
        .tile-title {
            position: relative;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="main-container" id="mainContainer">
        <div class="grid-wrapper">
            <div class="grid" id="gridContainer"></div>
        </div>

        <div class="toggle-row" id="toggleRow">
            <button class="toggle-btn" id="showMoreBtn" title="展开">
                <div class="toggle-icon-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>
                <span>展开</span>
            </button>
            <button class="toggle-btn hidden" id="showLessBtn" title="收起">
                <div class="toggle-icon-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="18 15 12 9 6 15"></polyline>
                    </svg>
                </div>
                <span>收起</span>
            </button>
        </div>
    </div>

    <div class="dialog-overlay hidden" id="dialogOverlay">
        <div class="dialog" id="dialog">
            <div class="dialog-title" id="dialogTitle">添加快捷方式</div>
            <div class="dialog-field">
                <label for="dialogInputName">名称</label>
                <input type="text" id="dialogInputName" placeholder="输入快捷方式名称" autocomplete="off" spellcheck="false">
            </div>
            <div class="dialog-field">
                <label for="dialogInputUrl">网址</label>
                <input type="url" id="dialogInputUrl" placeholder="输入网址" autocomplete="off" spellcheck="false">
            </div>
            <div class="dialog-buttons" id="dialogButtonsRow">
                <button class="dialog-btn remove-dialog-btn hidden" id="dialogRemoveBtn">移除</button>
                <div class="right-buttons">
                    <button class="dialog-btn cancel-btn" id="dialogCancelBtn">取消</button>
                    <button class="dialog-btn save-btn" id="dialogSaveBtn" disabled>保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            const STORAGE_KEY = 'custom_nav_page_bookmarks';
            const TOAST_DURATION = 8000;

            const gridContainer = document.getElementById('gridContainer');
            const toggleRow = document.getElementById('toggleRow');
            const showMoreBtn = document.getElementById('showMoreBtn');
            const showLessBtn = document.getElementById('showLessBtn');
            const dialogOverlay = document.getElementById('dialogOverlay');
            const dialogTitle = document.getElementById('dialogTitle');
            const dialogInputName = document.getElementById('dialogInputName');
            const dialogInputUrl = document.getElementById('dialogInputUrl');
            const dialogSaveBtn = document.getElementById('dialogSaveBtn');
            const dialogCancelBtn = document.getElementById('dialogCancelBtn');
            const dialogRemoveBtn = document.getElementById('dialogRemoveBtn');
            const dialogButtonsRow = document.getElementById('dialogButtonsRow');
            const toastContainer = document.getElementById('toastContainer');

            let bookmarks = [];
            let isExpanded = false;
            let editingId = null;
            let toastTimer = null;
            let lastRemovedBookmark = null;
            let lastRemovedIndex = null;

            function loadBookmarks() {
                try {
                    const stored = localStorage.getItem(STORAGE_KEY);
                    if (stored) {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            bookmarks = parsed;
                            return;
                        }
                    }
                } catch (e) {
                    console.warn('无法解析本地存储的书签数据。');
                }
                bookmarks = [];
                saveBookmarks();
            }

            function saveBookmarks() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
                } catch (e) {
                    console.warn('无法保存书签数据。');
                }
            }

            function getDynamicDefaultVisibleCount() {
                const gridStyle = window.getComputedStyle(gridContainer);
                const columns = gridStyle.gridTemplateColumns.split(' ').length;
                return columns * 2;
            }

            function getVisibleBookmarks() {
                const threshold = getDynamicDefaultVisibleCount();
                if (isExpanded || bookmarks.length <= threshold) {
                    return bookmarks;
                }
                return bookmarks.slice(0, threshold);
            }

            function updateToggleButtons() {
                const threshold = getDynamicDefaultVisibleCount();
                if (bookmarks.length <= threshold) {
                    showMoreBtn.classList.add('hidden');
                    showLessBtn.classList.add('hidden');
                    toggleRow.classList.add('hidden');
                } else {
                    toggleRow.classList.remove('hidden');
                    if (isExpanded) {
                        showMoreBtn.classList.add('hidden');
                        showLessBtn.classList.remove('hidden');
                    } else {
                        showMoreBtn.classList.remove('hidden');
                        showLessBtn.classList.add('hidden');
                    }
                }
            }

            function getFaviconUrl(url) {
                try {
                    const urlObj = new URL(url);
                    const domain = urlObj.hostname;
                    return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=64`;
                } catch (e) {
                    return '';
                }
            }

            function getDomainInitial(url) {
                try {
                    const urlObj = new URL(url);
                    const hostname = urlObj.hostname.replace(/^www\./, '');
                    const firstChar = hostname.charAt(0);
                    if (/[a-zA-Z]/.test(firstChar)) return firstChar.toUpperCase();
                    return hostname.substring(0, 1).toUpperCase();
                } catch (e) {
                    return '?';
                }
            }

            function createTileElement(bookmark, index) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.setAttribute('draggable', 'true');
                tile.setAttribute('data-id', bookmark.id);
                tile.setAttribute('data-index', index);
                tile.title = bookmark.title;

                const link = document.createElement('a');
                link.className = 'tile-link';
                link.href = bookmark.url;
                link.setAttribute('aria-label', bookmark.title);
                link.setAttribute('draggable', 'false');
                link.addEventListener('click', (e) => {
                    if (tile.classList.contains('dragging') || tile.dataset.wasDragged === 'true') {
                        e.preventDefault();
                        delete tile.dataset.wasDragged;
                    }
                });
                link.addEventListener('auxclick', (e) => {
                    if (e.button === 1) {
                        e.preventDefault();
                        window.open(bookmark.url, '_blank');
                    }
                });

                const iconContainer = document.createElement('div');
                iconContainer.className = 'tile-icon-container';

                const faviconUrl = getFaviconUrl(bookmark.url);
                const img = document.createElement('img');
                img.src = faviconUrl;
                img.alt = '';
                img.setAttribute('draggable', 'false');
                img.loading = 'lazy';

                const fallback = document.createElement('div');
                fallback.className = 'fallback-icon hidden';
                fallback.textContent = getDomainInitial(bookmark.url);

                img.addEventListener('error', () => {
                    img.classList.add('hidden');
                    fallback.classList.remove('hidden');
                });
                img.addEventListener('load', () => {
                    if (img.naturalWidth > 0) {
                        img.classList.remove('hidden');
                        fallback.classList.add('hidden');
                    }
                });
                if (!faviconUrl) {
                    img.classList.add('hidden');
                    fallback.classList.remove('hidden');
                }

                iconContainer.appendChild(img);
                iconContainer.appendChild(fallback);

                const titleEl = document.createElement('div');
                titleEl.className = 'tile-title';
                const titleSpan = document.createElement('span');
                titleSpan.textContent = bookmark.title;
                titleEl.appendChild(titleSpan);

                const actions = document.createElement('div');
                actions.className = 'tile-actions';

                const moreBtn = document.createElement('button');
                moreBtn.className = 'tile-action-btn more-btn';
                moreBtn.title = '更多操作';
                moreBtn.setAttribute('aria-label', '更多操作');
                moreBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>`;
                moreBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    openEditDialog(bookmark.id);
                });

                actions.appendChild(moreBtn);

                tile.appendChild(link);
                tile.appendChild(iconContainer);
                tile.appendChild(titleEl);
                tile.appendChild(actions);

                tile.addEventListener('dragstart', handleDragStart);
                tile.addEventListener('dragover', handleDragOver);
                tile.addEventListener('dragleave', handleDragLeave);
                tile.addEventListener('drop', handleDrop);
                tile.addEventListener('dragend', handleDragEnd);
                tile.addEventListener('mousedown', () => {
                    delete tile.dataset.wasDragged;
                });

                return tile;
            }

            function createAddTileElement() {
                const addTile = document.createElement('button');
                addTile.className = 'add-tile';
                addTile.title = '添加快捷方式';
                addTile.setAttribute('aria-label', '添加快捷方式');
                addTile.type = 'button';

                const iconContainer = document.createElement('div');
                iconContainer.className = 'tile-icon-container';
                iconContainer.innerHTML = `<svg class="plus-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`;

                const titleEl = document.createElement('div');
                titleEl.className = 'tile-title';
                const titleSpan = document.createElement('span');
                titleSpan.textContent = '添加快捷方式';
                titleEl.appendChild(titleSpan);

                addTile.appendChild(iconContainer);
                addTile.appendChild(titleEl);
                addTile.addEventListener('click', () => openAddDialog());
                return addTile;
            }

            function renderAll() {
                gridContainer.innerHTML = '';
                const visibleBookmarks = getVisibleBookmarks();
                visibleBookmarks.forEach((bookmark, index) => {
                    const tile = createTileElement(bookmark, index);
                    gridContainer.appendChild(tile);
                });
                const addTile = createAddTileElement();
                gridContainer.appendChild(addTile);
                updateToggleButtons();
            }

            let dragSourceId = null;
            let dragSourceIndex = null;

            function handleDragStart(e) {
                dragSourceId = this.getAttribute('data-id');
                dragSourceIndex = parseInt(this.getAttribute('data-index'));
                this.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', dragSourceId);
                setTimeout(() => {
                    if (this.classList.contains('dragging')) this.style.opacity = '0.4';
                }, 0);
            }

            function handleDragOver(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                if (this.getAttribute('data-id') !== dragSourceId) {
                    this.classList.add('drag-over');
                }
            }

            function handleDragLeave(e) {
                this.classList.remove('drag-over');
            }

            function handleDrop(e) {
                e.preventDefault();
                e.stopPropagation();
                this.classList.remove('drag-over');
                const targetId = this.getAttribute('data-id');
                if (!targetId || targetId === dragSourceId) return;

                const draggedTile = gridContainer.querySelector(`[data-id="${dragSourceId}"]`);
                if (draggedTile) draggedTile.dataset.wasDragged = 'true';

                const sourceIndex = bookmarks.findIndex(b => b.id === dragSourceId);
                const targetIndex = bookmarks.findIndex(b => b.id === targetId);
                if (sourceIndex !== -1 && targetIndex !== -1) {
                    const [moved] = bookmarks.splice(sourceIndex, 1);
                    bookmarks.splice(targetIndex, 0, moved);
                    saveBookmarks();
                    renderAll();
                }
                dragSourceId = null;
                dragSourceIndex = null;
            }

            function handleDragEnd(e) {
                this.classList.remove('dragging');
                this.style.opacity = '';
                gridContainer.querySelectorAll('.tile.drag-over').forEach(t => t.classList.remove('drag-over'));
                dragSourceId = null;
                dragSourceIndex = null;
            }

            function openAddDialog() {
                editingId = null;
                dialogTitle.textContent = '添加快捷方式';
                dialogInputName.value = '';
                dialogInputUrl.value = '';
                dialogSaveBtn.disabled = true;
                dialogSaveBtn.textContent = '保存';
                dialogRemoveBtn.classList.add('hidden');
                dialogButtonsRow.classList.remove('has-remove');
                
                showDialog();
                setTimeout(() => dialogInputName.focus(), 150);
            }

            function openEditDialog(bookmarkId) {
                const bookmark = bookmarks.find(b => b.id === bookmarkId);
                if (!bookmark) return;
                editingId = bookmarkId;
                dialogTitle.textContent = '编辑快捷方式';
                dialogInputName.value = bookmark.title;
                dialogInputUrl.value = bookmark.url;
                dialogSaveBtn.disabled = false;
                dialogSaveBtn.textContent = '保存';
                dialogRemoveBtn.classList.remove('hidden');
                dialogButtonsRow.classList.add('has-remove');

                showDialog();
                setTimeout(() => { dialogInputName.focus(); dialogInputName.select(); }, 150);
            }

            function showDialog() {
                dialogOverlay.classList.remove('hidden', 'closing');
            }

            function hideDialog() {
                dialogOverlay.classList.add('closing');
                const handleAnimationEnd = () => {
                    dialogOverlay.classList.add('hidden');
                    dialogOverlay.classList.remove('closing');
                    dialogOverlay.removeEventListener('animationend', handleAnimationEnd);
                };
                dialogOverlay.addEventListener('animationend', handleAnimationEnd);
                editingId = null;
            }

            function handleSaveDialog() {
                const name = dialogInputName.value.trim();
                let url = dialogInputUrl.value.trim();
                if (!name || !url) return;

                if (!/^https?:\/\//i.test(url)) {
                    if (/^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}/.test(url) || url.includes('.')) {
                        url = 'https://' + url;
                    } else if (!url.startsWith('/') && !url.startsWith('#')) {
                        url = 'https://' + url;
                    }
                }

                try {
                    new URL(url);
                } catch (e) {
                    if (!/^https?:\/\//i.test(url)) {
                        url = 'https://' + url;
                        try { new URL(url); } catch (e2) {
                            alert('请输入有效的网址。');
                            return;
                        }
                    } else {
                        alert('请输入有效的网址。');
                        return;
                    }
                }

                if (editingId) {
                    const bookmark = bookmarks.find(b => b.id === editingId);
                    if (bookmark) {
                        bookmark.title = name;
                        bookmark.url = url;
                    }
                } else {
                    const newBookmark = {
                        id: Date.now().toString(36) + Math.random().toString(36).substring(2, 8),
                        title: name,
                        url: url,
                    };
                    bookmarks.push(newBookmark);
                }
                saveBookmarks();
                hideDialog();
                renderAll();
            }

            function updateSaveButtonState() {
                const name = dialogInputName.value.trim();
                const url = dialogInputUrl.value.trim();
                dialogSaveBtn.disabled = !(name && url);
            }

            dialogInputName.addEventListener('input', updateSaveButtonState);
            dialogInputUrl.addEventListener('input', updateSaveButtonState);
            dialogSaveBtn.addEventListener('click', handleSaveDialog);
            dialogCancelBtn.addEventListener('click', hideDialog);
            
            dialogRemoveBtn.addEventListener('click', () => {
                if (editingId) {
                    removeBookmark(editingId);
                    hideDialog();
                }
            });

            dialogOverlay.addEventListener('click', (e) => {
                if (e.target === dialogOverlay) hideDialog();
            });
            document.addEventListener('keydown', (e) => {
                if (dialogOverlay.classList.contains('hidden')) return;
                if (e.key === 'Escape') { e.preventDefault(); hideDialog(); }
                else if (e.key === 'Enter' && !dialogSaveBtn.disabled) { e.preventDefault(); handleSaveDialog(); }
            });

            function removeBookmark(bookmarkId) {
                const index = bookmarks.findIndex(b => b.id === bookmarkId);
                if (index === -1) return;
                lastRemovedBookmark = bookmarks[index];
                lastRemovedIndex = index;
                bookmarks.splice(index, 1);
                saveBookmarks();
                renderAll();
                showUndoToast(lastRemovedBookmark.title, () => {
                    if (lastRemovedBookmark && lastRemovedIndex !== null) {
                        bookmarks.splice(lastRemovedIndex, 0, lastRemovedBookmark);
                        saveBookmarks();
                        renderAll();
                        lastRemovedBookmark = null;
                        lastRemovedIndex = null;
                    }
                });
            }

            function showUndoToast(title, undoCallback) {
                clearToast();
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `<span>已移除"<strong>${escapeHtml(title)}</strong>"</span><button class="toast-undo-btn" id="toastUndoBtn">撤销</button>`;
                toastContainer.appendChild(toast);
                toast.querySelector('#toastUndoBtn').addEventListener('click', () => {
                    undoCallback();
                    clearToast();
                });
                toastTimer = setTimeout(() => dismissToast(toast), TOAST_DURATION);
            }

            function clearToast() {
                if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
                toastContainer.innerHTML = '';
                lastRemovedBookmark = null;
                lastRemovedIndex = null;
            }

            function dismissToast(toastEl) {
                if (!toastEl || toastEl.classList.contains('removing')) return;
                toastEl.classList.add('removing');
                const handleAnimEnd = () => {
                    if (toastEl.parentNode) toastEl.parentNode.removeChild(toastEl);
                    toastEl.removeEventListener('animationend', handleAnimEnd);
                    if (toastContainer.children.length === 0) {
                        lastRemovedBookmark = null;
                        lastRemovedIndex = null;
                    }
                };
                toastEl.addEventListener('animationend', handleAnimEnd);
                toastTimer = null;
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            showMoreBtn.addEventListener('click', () => { isExpanded = true; renderAll(); });
            showLessBtn.addEventListener('click', () => { isExpanded = false; renderAll(); gridContainer.scrollIntoView({ behavior: 'smooth', block: 'start' }); });

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'z' && dialogOverlay.classList.contains('hidden')) {
                    if (lastRemovedBookmark && lastRemovedIndex !== null) {
                        e.preventDefault();
                        bookmarks.splice(lastRemovedIndex, 0, lastRemovedBookmark);
                        saveBookmarks();
                        renderAll();
                        clearToast();
                    }
                }
                if (e.ctrlKey && e.shiftKey && e.key === 'A' && dialogOverlay.classList.contains('hidden')) {
                    e.preventDefault();
                    openAddDialog();
                }
            });

            let resizeDebounceTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeDebounceTimer);
                resizeDebounceTimer = setTimeout(() => {
                    if (!isExpanded && bookmarks.length > getDynamicDefaultVisibleCount()) {
                        renderAll();
                    } else {
                        updateToggleButtons();
                    }
                }, 250);
            });

            function init() {
                loadBookmarks();
                isExpanded = false;
                renderAll();
            }

            init();
        })();
    </script>
</body>
</html>
