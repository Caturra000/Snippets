<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruce的硬核训练日志</title>
    <style>
        /* 隐藏全局滚动条 */
        html { scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar { display: none; }
        
        /* 主题色变量 */
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --accent: #238636;
            --accent-hover: #2ea043;
            --danger: #da3633;
            --quick-fill: #dba61f;
            --level-0: #161b22;
            --level-1: #0e4429;
            --level-2: #006d32;
            --level-3: #26a641;
            --level-4: #39d353;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px 10px; display: flex; justify-content: center; line-height: 1.5; position: relative; }
        .container { max-width: 800px; width: 100%; box-sizing: border-box; }
        
        /* 导航标签 */
        .tabs { display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 20px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        .tab:hover { color: var(--text-main); }
        .tab.active { color: var(--text-main); border-bottom-color: #f78166; }

        .panel { display: none; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 20px; box-sizing: border-box; }
        .panel.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* 表单基础样式 */
        select, input[type="date"], input[type="text"], input[type="number"] { background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px; border-radius: 4px; box-sizing: border-box; }
        select { width: 100%; margin-bottom: 15px; font-size: 1em; cursor: pointer; }
        button { background-color: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: var(--accent-hover); }
        .btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-quick { background-color: rgba(219, 166, 31, 0.1); color: var(--quick-fill); border: 1px solid var(--quick-fill); padding: 4px 8px; border-radius: 4px; font-size: 0.8em; margin-left: auto; }
        .btn-quick:hover { background-color: var(--quick-fill); color: #000; }
        .btn-danger { background-color: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 4px 8px; font-size: 0.8em;}
        .btn-danger:hover { background-color: var(--danger); color: white; }

        /* 隐藏数字输入框的默认调节箭头 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* 训练项 UI */
        .exercise-item { border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; margin-bottom: 15px; background: #0d1117; }
        .exercise-header { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; }
        .exercise-title { font-weight: bold; font-size: 1.1em; color: #58a6ff; }
        .exercise-target { font-size: 0.9em; color: var(--text-muted); }
        .bruce-tip { font-size: 0.85em; color: #d2a8ff; font-style: italic; margin-bottom: 12px; }
        .sets-container { display: flex; flex-direction: column; gap: 10px; }
        .set-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .set-label { width: 50px; font-size: 0.9em; color: var(--text-muted); }
        .set-input { width: 80px; text-align: center; flex-grow: 1; max-width: 100px; }
        .set-unit { color: var(--text-muted); font-size: 0.9em; }
        .rest-day-check { display: flex; align-items: center; gap: 10px; font-size: 1.1em; cursor: pointer; user-select: none; }

        /* 编辑页 UI */
        .edit-meta-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; margin-bottom: 20px; }
        .edit-card { border: 1px solid var(--border-color); background: #0d1117; border-radius: 6px; padding: 15px; margin-bottom: 15px; position: relative;}
        .edit-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; flex-wrap: wrap;}
        .edit-row label { display: flex; align-items: center; gap: 5px; font-size: 0.9em; cursor: pointer; color: var(--text-main);}
        .edit-card input[type="text"] { flex: 1; min-width: 150px;}

        /* 热力图 */
        .year-selector { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; scrollbar-width: none; }
        .year-selector::-webkit-scrollbar { display: none; }
        .year-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 6px 12px; border-radius: 4px; font-size: 1em; }
        .year-btn.active { background: var(--accent); color: white; }
        
        .heatmap-wrapper { overflow-x: auto; padding-bottom: 15px; scrollbar-width: thin; scrollbar-color: var(--border-color) transparent; }
        .heatmap-wrapper::-webkit-scrollbar { height: 8px; display: block; } 
        .heatmap-wrapper::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 4px; }
        .heatmap-grid { position: relative; display: grid; grid-template-rows: repeat(7, 14px); grid-auto-flow: column; gap: 4px; width: max-content; }
        .cell { width: 14px; height: 14px; border-radius: 3px; background-color: var(--level-0); border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.1s; }
        .cell[data-level="1"] { background-color: var(--level-1); }
        .cell[data-level="2"] { background-color: var(--level-2); }
        .cell[data-level="3"] { background-color: var(--level-3); }
        .cell[data-level="4"] { background-color: var(--level-4); }
        .cell:hover { border-color: #fff; transform: scale(1.2); }

        /* 全局悬浮气泡 */
        .global-tooltip { position: fixed; background: rgba(0, 0, 0, 0.9); color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 12px; pointer-events: none; z-index: 9999; opacity: 0; transition: opacity 0.15s; white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }

        /* 分析与回放 */
        .playback-box { background: #0d1117; border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; margin-top: 20px; display: none; }
        .playback-set { font-size: 0.9em; color: var(--text-muted); margin-left: 15px; }
        .trend-chart { display: flex; align-items: flex-end; gap: 8px; height: 150px; margin-top: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .bar-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
        .bar { width: 100%; max-width: 35px; background-color: var(--accent); border-radius: 3px 3px 0 0; transition: height 0.5s; position: relative; }
        .bar:hover::after { content: attr(data-val); position: absolute; top: -25px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 2px 6px; border-radius: 3px; font-size: 12px; font-weight: bold; z-index: 2;}
        .month-label { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
        .analysis-box { background: rgba(35, 134, 54, 0.1); border-left: 4px solid var(--accent); padding: 15px; margin-top: 20px; border-radius: 4px; }
        .warning-box { border-left-color: var(--danger); background: rgba(218, 54, 51, 0.1); }

        /* 加载过渡层 */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; align-items: center; justify-content: center; z-index: 10000; font-size: 1.2em; font-weight: bold; color: var(--text-muted); transition: opacity 0.3s; }

        @media (max-width: 600px) {
            .set-row { justify-content: space-between; }
            .set-input { width: 30%; flex-grow: 0; }
            .btn-quick { width: 100%; text-align: center; margin-top: 5px; margin-left: 0; }
            .panel { padding: 15px 10px; }
        }
    </style>
</head>
<body>

<div id="loading-screen">加载中...</div>
<div id="global-tooltip" class="global-tooltip"></div>

<div class="container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('today', this)">📝 今日打卡</div>
        <div class="tab" onclick="switchTab('stats', this)">📊 统计与回放</div>
        <div class="tab" onclick="switchTab('edit', this)">⚙️ 计划定制</div>
        <div class="tab" onclick="switchTab('data', this)">💾 数据管理</div>
    </div>

    <!-- 面板1：今日打卡 -->
    <div id="today" class="panel active">
        <h2>🔥 今天的战斗容量</h2>
        <input type="date" id="date-picker" style="margin-bottom: 15px; width: auto;">
        
        <select id="day-selector" onchange="loadDayPlan()"></select>

        <div id="exercise-list"></div>
        <input type="text" id="daily-note" placeholder="今日总体备注 (状态、饮食等，选填)" style="width:100%; margin-top:15px; display:none;">
        <button id="save-btn" style="display: none; width: 100%; margin-top: 20px; font-size: 1.1em;" onclick="saveDailyLog()">保存今日容量</button>
        <div id="daily-feedback" style="margin-top: 15px;"></div>
    </div>

    <!-- 面板2：统计分析 -->
    <div id="stats" class="panel">
        <div class="year-selector" id="year-tabs"></div>
        <div class="heatmap-wrapper" id="heatmap-scroll-area">
            <div class="heatmap-grid" id="heatmap"></div>
        </div>
        <div id="playback-area" class="playback-box">
            <h3 id="pb-title" style="margin-top:0; color:#58a6ff;">点击上方的方块查看记录</h3>
            <div id="pb-content"></div>
        </div>
        <h3 style="margin-top: 30px;">📈 训练频次趋势 (月度)</h3>
        <div class="trend-chart" id="trend-chart"></div>
        <h3 style="margin-top: 30px;">Bruce 的近期评估：</h3>
        <div id="ai-analysis">加载中...</div>
    </div>

    <!-- 面板3：编辑计划 -->
    <div id="edit" class="panel">
        <h2>⚙️ 自由定制每周循环</h2>
        <p style="color:var(--text-muted); font-size:0.9em;">在此重塑你的训练分化表。修改此处<b>不会影响</b>过去的打卡历史。</p>
        
        <select id="edit-day-selector" onchange="loadEditPlan()"></select>

        <div class="edit-meta-box">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap;">
                <span style="white-space:nowrap; color: var(--text-muted);">本计划名:</span>
                <input type="text" id="ed-day-title" style="font-weight:bold; font-size:1.1em; max-width: 300px;">
            </div>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--accent);">
                <input type="checkbox" id="ed-day-isrest" onchange="toggleEditRestDay()" style="width:18px;height:18px; accent-color: var(--accent);">
                <b>将这一天设为【休息日 / 自定义有氧日】(无需记录容量)</b>
            </label>
        </div>

        <div id="edit-exercise-wrapper">
            <div id="edit-exercise-list"></div>
            <button class="btn-outline" style="width: 100%; margin-top: 10px; border-style: dashed;" onclick="addExerciseToEdit()">+ 新增动作</button>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 25px; flex-wrap: wrap;">
            <button style="flex: 2; min-width: 200px;" onclick="saveCustomPlan()">💾 保存这天的设置</button>
            <button style="flex: 1; min-width: 150px; background: transparent; border: 1px solid var(--danger); color: var(--danger);" onclick="restoreDefaultPlan()">🔄 恢复默认出厂</button>
        </div>
        <div id="edit-feedback" style="margin-top: 15px; color: var(--level-4); font-weight: bold;"></div>
    </div>

    <!-- 面板4：数据管理 -->
    <div id="data" class="panel">
        <h2>💾 数据存档与恢复</h2>
        <p style="color: var(--text-muted); font-size: 0.9em;">所有数据均安全地保存在您的设备本地。建议定期导出备份，以便在更换设备或清理浏览器缓存时恢复。</p>
        <button onclick="exportJSON()">📥 导出完整备份 (JSON)</button>
        <div style="margin-top: 20px;">
            <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
            <button class="btn-outline" onclick="document.getElementById('import-file').click()">📤 导入恢复数据 (JSON)</button>
        </div>
        <button class="btn-outline" style="color: var(--danger); border-color: var(--danger); margin-top: 40px;" onclick="clearData()">⚠️ 清空所有本地数据</button>
    </div>
</div>

<script>
    // ==========================================
    // 1. 本地数据库驱动 (IndexedDB)
    // ==========================================
    const DB_NAME = 'BruceWorkoutData';
    const STORE_NAME = 'store';

    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => { e.target.result.createObjectStore(STORE_NAME); };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    async function dbGet(key) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const req = db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    async function dbSet(key, value) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            if (value === null || value === undefined) {
                tx.objectStore(STORE_NAME).delete(key).onsuccess = () => resolve();
            } else {
                tx.objectStore(STORE_NAME).put(value, key).onsuccess = () => resolve();
            }
        });
    }

    async function dbClear() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.deleteDatabase(DB_NAME);
            req.onsuccess = () => resolve();
            req.onerror = () => reject();
        });
    }

    // ==========================================
    // 2. 工具与核心逻辑函数
    // ==========================================
    function esc(s) { 
        if (!s) return "";
        const d = document.createElement('div'); 
        d.textContent = s; 
        return d.innerHTML; 
    }

    function toLocalDateStr(dateObj) {
        const d = dateObj || new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function isRestDayLog(data) {
        return data && data.exercises && data.exercises.length === 0;
    }

    // ==========================================
    // 3. 初始状态与预设数据
    // ==========================================
    const defaultWorkoutPlan = {
        "day1": { title: "Day 1：绝对力量推日", isRest: false, exercises: [
            { id: "d1e1", name: "泽奇/高脚杯深蹲", sets: 3, repsDesc: "8-10次", tip: "激素启动器！重点在激活神经。", isCore: true },
            { id: "d1e2", name: "站姿杠铃推举", sets: 4, repsDesc: "6-8次", tip: "上肢深蹲，夹紧臀部！", isCore: false },
            { id: "d1e3", name: "地板卧推", sets: 4, repsDesc: "6-8次", tip: "安全的大重量推胸。", isCore: false },
            { id: "d1e4", name: "侧平举", sets: 4, repsDesc: "15-20次", tip: "雕刻肩膀细节。", isCore: false },
            { id: "d1e5", name: "窄距俯卧撑", sets: 2, repsDesc: "力竭", tip: "榨干最后一丝力气。", isCore: false }
        ]},
        "day2": { title: "Day 2：绝对力量拉日", isRest: false, exercises: [
            { id: "d2e1", name: "传统硬拉", sets: 4, repsDesc: "3-5次", tip: "今日主角！睾酮开关，直击神经！", isCore: true },
            { id: "d2e2", name: "引体向上", sets: 4, repsDesc: "力竭", tip: "背部的绝对王者。", isCore: false },
            { id: "d2e3", name: "杠铃划船", sets: 3, repsDesc: "8-10次", tip: "增加背部厚度。", isCore: false },
            { id: "d2e4", name: "杠铃弯举", sets: 3, repsDesc: "10-12次", tip: "控制离心。", isCore: false },
            { id: "d2e5", name: "农夫行走", sets: 3, repsDesc: "45-60秒", tip: "拿最重的哑铃走！", isCore: true }
        ]},
        "day3": { title: "Day 3：完全休息日", isRest: true, exercises: [] },
        "day4": { title: "Day 4：肌肥大推日", isRest: false, exercises: [
            { id: "d4e1", name: "保加利亚分腿蹲", sets: 3, repsDesc: "8-10次", tip: "左腿做完立马右腿，让心率飙升！", isCore: true },
            { id: "d4e2", name: "上斜哑铃卧推", sets: 4, repsDesc: "10-12次", tip: "主攻上胸。", isCore: false },
            { id: "d4e3", name: "哑铃地板飞鸟", sets: 3, repsDesc: "12-15次", tip: "感受胸肌拉伸。", isCore: false },
            { id: "d4e4", name: "坐姿哑铃推举", sets: 3, repsDesc: "10-12次", tip: "稳定推举。", isCore: false },
            { id: "d4e5", name: "过头臂屈伸", sets: 3, repsDesc: "12-15次", tip: "三头长头拉伸。", isCore: false }
        ]},
        "day5": { title: "Day 5：肌肥大拉日", isRest: false, exercises: [
            { id: "d5e1", name: "高翻 / 悬垂翻", sets: 4, repsDesc: "3-5次", tip: "猛烈蹬地，快肌纤维生长的关键。", isCore: true },
            { id: "d5e2", name: "单臂哑铃划船", sets: 4, repsDesc: "8-12次", tip: "大重量单侧拉伸。", isCore: false },
            { id: "d5e3", name: "反手引体向上", sets: 3, repsDesc: "力竭", tip: "背阔下部和二头。", isCore: false },
            { id: "d5e4", name: "上斜哑铃弯举", sets: 3, repsDesc: "12次", tip: "长头终结者。", isCore: false },
            { id: "d5e5", name: "俯身哑铃飞鸟", sets: 4, repsDesc: "15-20次", tip: "后束体态关键。", isCore: false }
        ]},
        "day6": { title: "Day 6：自定义安排 (预留)", isRest: true, exercises: [] },
        "day7": { title: "Day 7：自定义安排 (预留)", isRest: true, exercises: [] }
    };

    let appData = {};
    let currentWorkoutPlan = {};
    let currentStatsYear = String(new Date().getFullYear());
    const todayStr = toLocalDateStr();

    window.onload = async () => {
        try {
            const savedLogs = await dbGet('logs');
            const savedPlan = await dbGet('plan');

            appData = savedLogs || {};
            currentWorkoutPlan = savedPlan || JSON.parse(JSON.stringify(defaultWorkoutPlan));

            document.getElementById('date-picker').value = todayStr;
            updateSelectOptions();
            if(appData[todayStr]) {
                document.getElementById('day-selector').value = appData[todayStr].dayType;
            }
            
            loadDayPlan();
            renderYearTabs();
            renderStats(currentStatsYear);

            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.style.opacity = '0';
            setTimeout(() => loadingScreen.style.display = 'none', 300);
        } catch (e) {
            document.getElementById('loading-screen').innerHTML = "加载失败，请确保浏览器支持本地存储。";
        }
    };

    // ==========================================
    // 4. UI 交互与通用功能
    // ==========================================
    function updateSelectOptions() {
        const trackerSelect = document.getElementById('day-selector');
        const editSelect = document.getElementById('edit-day-selector');
        let tVal = trackerSelect.value;
        let eVal = editSelect.value;
        
        let tHtml = '<option value="">-- 选择今天的计划 --</option>';
        let eHtml = '';
        
        for(let i=1; i<=7; i++) {
            let k = 'day'+i;
            let title = esc(currentWorkoutPlan[k].title);
            tHtml += `<option value="${k}">${title}</option>`;
            eHtml += `<option value="${k}">编辑：${title}</option>`;
        }
        
        trackerSelect.innerHTML = tHtml;
        editSelect.innerHTML = eHtml;
        
        if (tVal) trackerSelect.value = tVal;
        if (eVal) editSelect.value = eVal;  
        if (!editSelect.value) editSelect.value = 'day1'; 
    }

    function switchTab(tabId, tabEl) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tabEl.classList.add('active');
        document.getElementById(tabId).classList.add('active');

        if(tabId === 'stats') {
            renderYearTabs();
            renderStats(currentStatsYear);
        } else if (tabId === 'edit') {
            loadEditPlan();
        } else if (tabId === 'today') {
            updateSelectOptions();
            loadDayPlan(); 
        }
    }

    // ==========================================
    // 5. 今日打卡模块
    // ==========================================
    function getHistoryWeight(exId, setIndex) {
        const dates = Object.keys(appData).sort((a,b) => new Date(b) - new Date(a));
        const currentDate = document.getElementById('date-picker').value;
        for (let d of dates) {
            if (d === currentDate) continue;
            const data = appData[d];
            if (!data.exercises) continue;
            const ex = data.exercises.find(e => e.id === exId);
            if (ex && ex.setsData && ex.setsData[setIndex] && ex.setsData[setIndex].weight) {
                return ex.setsData[setIndex].weight;
            }
        }
        return '';
    }

    function parseTargetReps(repsDesc) {
        const matches = repsDesc.match(/\d+/g);
        return matches ? matches[matches.length - 1] : 12; 
    }

    window.quickFill = function(exId, defaultRepsStr) {
        const item = document.querySelector(`.exercise-item[data-id="${exId}"]`);
        const wInputs = item.querySelectorAll('.set-w');
        const rInputs = item.querySelectorAll('.set-r');
        const targetReps = parseTargetReps(defaultRepsStr);

        for(let i = 0; i < wInputs.length; i++) {
            if(!wInputs[i].value) wInputs[i].value = getHistoryWeight(exId, i);
            rInputs[i].value = targetReps; 
        }
    };

    function loadDayPlan() {
        const day = document.getElementById('day-selector').value;
        const listDiv = document.getElementById('exercise-list');
        const saveBtn = document.getElementById('save-btn');
        const noteInput = document.getElementById('daily-note');
        const feedbackDiv = document.getElementById('daily-feedback');
        
        listDiv.innerHTML = '';
        feedbackDiv.innerHTML = '';
        noteInput.value = '';
        
        if (!day) { 
            saveBtn.style.display = 'none'; 
            noteInput.style.display = 'none';
            return; 
        }

        const date = document.getElementById('date-picker').value;
        const savedData = appData[date] && appData[date].dayType === day ? appData[date] : null;
        const planObj = currentWorkoutPlan[day];

        let html = '';
        if (planObj.isRest) {
            const checked = savedData && savedData.score === 100 ? 'checked' : '';
            html = `<div class="exercise-item" style="border-color: var(--accent);">
                        <label class="rest-day-check">
                            <input type="checkbox" id="rest-check" style="width:25px;height:25px;" ${checked}>
                            我今天完成了休息或有氧安排。
                        </label>
                        <div class="bruce-tip" style="margin-top:10px;">" 肌肉是在休息时生长的，不要有负罪感。 "</div>
                    </div>`;
        } else {
            planObj.exercises.forEach(ex => {
                let setsHtml = '<div class="sets-container">';
                for(let i = 0; i < ex.sets; i++) {
                    let w = '', r = '';
                    if (savedData) {
                        const savedEx = savedData.exercises.find(e => e.id === ex.id);
                        if (savedEx && savedEx.setsData[i]) {
                            w = esc(savedEx.setsData[i].weight);
                            r = esc(savedEx.setsData[i].reps);
                        }
                    } else {
                        w = getHistoryWeight(ex.id, i);
                    }

                    setsHtml += `
                        <div class="set-row">
                            <span class="set-label">第 ${i+1} 组</span>
                            <input type="number" step="0.5" class="set-input set-w" placeholder="kg" value="${w}">
                            <span class="set-unit">x</span>
                            <input type="number" class="set-input set-r" placeholder="次数" value="${r}">
                            <span class="set-unit">(${esc(ex.repsDesc)})</span>
                        </div>`;
                }
                setsHtml += '</div>';

                html += `
                    <div class="exercise-item" data-id="${ex.id}" data-core="${ex.isCore || false}" data-total-sets="${ex.sets}">
                        <div class="exercise-header">
                            <div>
                                <span class="exercise-title">${esc(ex.name)} ${ex.isCore ? '🔥' : ''}</span>
                                <span class="exercise-target">/ ${ex.sets}组</span>
                            </div>
                            <button class="btn-quick" onclick="quickFill('${ex.id}', '${esc(ex.repsDesc)}')">⚡ 一键填满</button>
                        </div>
                        <div class="bruce-tip">" ${esc(ex.tip)} "</div>
                        ${setsHtml}
                    </div>
                `;
            });
        }
        
        listDiv.innerHTML = html;
        saveBtn.style.display = 'block';
        noteInput.style.display = 'block';
        if (savedData && savedData.note) noteInput.value = savedData.note;
    }

    document.getElementById('date-picker').addEventListener('change', () => {
        const date = document.getElementById('date-picker').value;
        document.getElementById('day-selector').value = appData[date] ? appData[date].dayType : '';
        loadDayPlan();
    });

    async function saveDailyLog() {
        const dayType = document.getElementById('day-selector').value;
        if (!dayType || !currentWorkoutPlan[dayType]) return; 

        const date = document.getElementById('date-picker').value;
        const note = document.getElementById('daily-note').value;
        const items = document.querySelectorAll('.exercise-item');
        const dayTitle = currentWorkoutPlan[dayType].title; 
        
        if (currentWorkoutPlan[dayType].isRest) {
            const done = document.getElementById('rest-check').checked;
            appData[date] = { dayType, title: dayTitle, score: done ? 100 : 0, note, exercises: [] };
        } else {
            let targetTotalSets = 0;
            let completedTotalSets = 0;
            let coreMissedName = "";
            let logs = [];

            items.forEach(item => {
                const id = item.getAttribute('data-id');
                const isCore = item.getAttribute('data-core') === 'true';
                const totalSets = parseInt(item.getAttribute('data-total-sets'));
                const name = item.querySelector('.exercise-title').innerText.replace('🔥', '').trim();
                
                targetTotalSets += totalSets;
                let setsData = [];
                let setsDoneForThisEx = 0;

                const wInputs = item.querySelectorAll('.set-w');
                const rInputs = item.querySelectorAll('.set-r');

                for(let i=0; i<totalSets; i++) {
                    const w = wInputs[i].value;
                    const r = rInputs[i].value;
                    setsData.push({ weight: w, reps: r });
                    if (r !== '' || (w !== '' && w !== '0')) {
                        setsDoneForThisEx++;
                        completedTotalSets++;
                    }
                }

                logs.push({ id, name, setsData, targetSets: totalSets, completedSets: setsDoneForThisEx });
                if (isCore && setsDoneForThisEx === 0) coreMissedName = name;
            });

            const score = targetTotalSets === 0 ? 0 : Math.round((completedTotalSets / targetTotalSets) * 100);
            appData[date] = { dayType, title: dayTitle, score, note, exercises: logs, coreMissed: coreMissedName !== "" };
        }

        await dbSet('logs', appData);
        showFeedback(date);

        const btn = document.getElementById('save-btn');
        const oldTxt = btn.innerText;
        btn.innerText = "✅ 记录已保存";
        btn.style.backgroundColor = "var(--level-4)";
        setTimeout(() => { btn.innerText = oldTxt; btn.style.backgroundColor = "var(--accent)"; }, 2000);
    }

    function showFeedback(date) {
        const data = appData[date];
        const feedbackDiv = document.getElementById('daily-feedback');
        if(!data || data.score === 0) { feedbackDiv.innerHTML = ''; return; }

        let fbHtml = "";
        if (isRestDayLog(data)) {
            fbHtml = `<div class="analysis-box">Bruce: “很好的执行力，休息也是计划的一部分。”</div>`;
        } else if (data.coreMissed) {
            fbHtml = `<div class="analysis-box warning-box">Bruce: “嘿！你跳过了核心动作？容量再高，没有地基刺激，效果也会大打折扣！”</div>`;
        } else if (data.score === 100) {
            fbHtml = `<div class="analysis-box">Bruce: “完美！所有的组都吃下了。去补充营养吧！”</div>`;
        } else if (data.score >= 60) {
            fbHtml = `<div class="analysis-box">Bruce: “完成了 ${data.score}% 的容量。留得青山在，下次试着补齐。”</div>`;
        } else {
            fbHtml = `<div class="analysis-box warning-box">Bruce: “只完成了不到一半？不要让数字欺骗你，要对得起你流的汗。”</div>`;
        }
        feedbackDiv.innerHTML = fbHtml;
    }

    // ==========================================
    // 6. 编辑计划模块
    // ==========================================
    function toggleEditRestDay() {
        const isRest = document.getElementById('ed-day-isrest').checked;
        document.getElementById('edit-exercise-wrapper').style.display = isRest ? 'none' : 'block';
    }

    function loadEditPlan() {
        const day = document.getElementById('edit-day-selector').value;
        const planObj = currentWorkoutPlan[day];
        
        document.getElementById('ed-day-title').value = planObj.title;
        document.getElementById('ed-day-isrest').checked = planObj.isRest;
        toggleEditRestDay();

        const container = document.getElementById('edit-exercise-list');
        container.innerHTML = '';
        
        planObj.exercises.forEach(ex => {
            const el = document.createElement('div');
            el.className = 'edit-card';
            el.setAttribute('data-id', ex.id);
            el.innerHTML = `
                <div class="edit-row">
                    <input type="text" class="ed-name" value="${esc(ex.name)}" placeholder="动作名称" style="font-weight:bold;">
                    <label><input type="checkbox" class="ed-core" ${ex.isCore ? 'checked' : ''}> 🔥核心</label>
                    <button class="btn-danger" onclick="this.parentElement.parentElement.remove()" style="margin-left:auto;">删除</button>
                </div>
                <div class="edit-row">
                    <span style="color:var(--text-muted); font-size:0.9em;">目标组数:</span>
                    <input type="number" class="ed-sets" value="${ex.sets}" min="1" max="20" style="width:70px;">
                    <span style="color:var(--text-muted); font-size:0.9em; margin-left:10px;">要求:</span>
                    <input type="text" class="ed-reps" value="${esc(ex.repsDesc)}" placeholder="如: 8-10次">
                </div>
                <div class="edit-row" style="margin-bottom:0;">
                    <input type="text" class="ed-tip" value="${esc(ex.tip)}" placeholder="提示或要点 (选填)" style="width:100%; font-size:0.9em;">
                </div>
            `;
            container.appendChild(el);
        });
        document.getElementById('edit-feedback').innerText = '';
    }

    function addExerciseToEdit() {
        const container = document.getElementById('edit-exercise-list');
        const el = document.createElement('div');
        el.className = 'edit-card';
        el.setAttribute('data-id', 'custom_' + Date.now());
        el.innerHTML = `
            <div class="edit-row">
                <input type="text" class="ed-name" value="" placeholder="新动作名称" style="font-weight:bold;">
                <label><input type="checkbox" class="ed-core"> 🔥核心</label>
                <button class="btn-danger" onclick="this.parentElement.parentElement.remove()" style="margin-left:auto;">删除</button>
            </div>
            <div class="edit-row">
                <span style="color:var(--text-muted); font-size:0.9em;">目标组数:</span>
                <input type="number" class="ed-sets" value="3" min="1" max="20" style="width:70px;">
                <span style="color:var(--text-muted); font-size:0.9em; margin-left:10px;">要求:</span>
                <input type="text" class="ed-reps" value="8-12次" placeholder="如: 8-10次">
            </div>
            <div class="edit-row" style="margin-bottom:0;">
                <input type="text" class="ed-tip" value="" placeholder="提示或要点 (选填)" style="width:100%; font-size:0.9em;">
            </div>
        `;
        container.appendChild(el);
    }

    async function saveCustomPlan() {
        const day = document.getElementById('edit-day-selector').value;
        const isRest = document.getElementById('ed-day-isrest').checked;
        const title = document.getElementById('ed-day-title').value || `Day 自定义`;
        
        let newExercises = [];
        if (!isRest) {
            const cards = document.querySelectorAll('.edit-card');
            cards.forEach(card => {
                newExercises.push({
                    id: card.getAttribute('data-id'),
                    name: card.querySelector('.ed-name').value || "未命名动作",
                    sets: parseInt(card.querySelector('.ed-sets').value) || 1,
                    repsDesc: card.querySelector('.ed-reps').value || "力竭",
                    tip: card.querySelector('.ed-tip').value || "",
                    isCore: card.querySelector('.ed-core').checked
                });
            });
        }

        currentWorkoutPlan[day] = { title: title, isRest: isRest, exercises: newExercises };
        
        await dbSet('plan', currentWorkoutPlan);
        updateSelectOptions(); 
        
        const fb = document.getElementById('edit-feedback');
        fb.innerText = `✅ [${esc(title)}] 计划已更新！`;
        setTimeout(() => fb.innerText = '', 3000);
    }

    async function restoreDefaultPlan() {
        if(confirm("⚠️ 是否恢复为初始的预设计划？这不会影响您的打卡历史记录。")) {
            await dbSet('plan', null); 
            currentWorkoutPlan = JSON.parse(JSON.stringify(defaultWorkoutPlan));
            updateSelectOptions();
            loadEditPlan();
            alert("已恢复默认计划。");
        }
    }

    // ==========================================
    // 7. 统计与分析模块
    // ==========================================
    function renderYearTabs() {
        const years = new Set(Object.keys(appData).map(d => d.split('-')[0]));
        years.add(String(new Date().getFullYear())); 
        
        const container = document.getElementById('year-tabs');
        container.innerHTML = Array.from(years).sort().reverse().map(y => 
            `<button class="year-btn ${y === currentStatsYear ? 'active' : ''}" onclick="changeYear('${y}')">${y}</button>`
        ).join('');
    }

    function changeYear(year) {
        currentStatsYear = String(year);
        renderYearTabs();
        renderStats(currentStatsYear);
        document.getElementById('playback-area').style.display = 'none';
    }

    function renderStats(year) {
        const heatmap = document.getElementById('heatmap');
        heatmap.innerHTML = '';
        
        const startDate = new Date(year, 0, 1);
        const endDate = new Date(year, 11, 31);
        const startDayOfWeek = startDate.getDay();

        for(let i=0; i<startDayOfWeek; i++) {
            const empty = document.createElement('div');
            empty.className = 'cell';
            empty.style.visibility = 'hidden';
            heatmap.appendChild(empty);
        }

        const globalTooltip = document.getElementById('global-tooltip');

        let d = new Date(startDate);
        while(d <= endDate) {
            const dateStr = toLocalDateStr(d);
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.setAttribute('data-date', dateStr); 
            
            let level = 0;
            let info = dateStr + " - 无记录";
            
            if (appData[dateStr]) {
                const data = appData[dateStr];
                const score = data.score;
                const titleStr = data.title || (currentWorkoutPlan[data.dayType] ? currentWorkoutPlan[data.dayType].title : "未知计划");
                
                if(isRestDayLog(data)) {
                    level = 1;
                    info = `${dateStr} - [休息] ${titleStr}`;
                } else if(score > 0) {
                    if (score === 100) level = 4;
                    else if (score >= 75) level = 3;
                    else if (score >= 40) level = 2;
                    else level = 1;
                    info = `${dateStr} - ${titleStr} (${score}%)`;
                }
            }
            
            cell.setAttribute('data-level', level);
            
            cell.addEventListener('mouseenter', () => {
                globalTooltip.innerText = info;
                const rect = cell.getBoundingClientRect();
                globalTooltip.style.left = (rect.left + (rect.width / 2) - (globalTooltip.offsetWidth / 2)) + 'px';
                globalTooltip.style.top = (rect.top - globalTooltip.offsetHeight - 8) + 'px';
                globalTooltip.style.opacity = '1';
            });
            cell.addEventListener('mouseleave', () => { globalTooltip.style.opacity = '0'; });
            cell.onclick = () => showPlayback(dateStr);
            heatmap.appendChild(cell);
            
            d.setDate(d.getDate() + 1);
        }

        setTimeout(() => {
            const wrapper = document.getElementById('heatmap-scroll-area');
            let targetCell = document.querySelector(`.cell[data-date="${todayStr}"]`);
            if (!targetCell) {
                const allCells = document.querySelectorAll('.cell[data-date]');
                targetCell = allCells[allCells.length - 1]; 
            }
            if (targetCell) {
                const centerPos = targetCell.offsetLeft - (wrapper.clientWidth / 2) + (targetCell.clientWidth / 2);
                wrapper.scrollTo({ left: centerPos, behavior: 'smooth' });
            }
        }, 150);

        renderTrendChart(year);
        generateAnalysis(year);
    }

    function showPlayback(dateStr) {
        const pbArea = document.getElementById('playback-area');
        const title = document.getElementById('pb-title');
        const content = document.getElementById('pb-content');
        
        pbArea.style.display = 'block';
        
        if(!appData[dateStr] || appData[dateStr].score === 0) {
            title.innerText = `📅 ${dateStr} - 无记录`;
            title.style.color = "var(--text-muted)";
            content.innerHTML = "<p>这一天没有留下记录。</p>";
            return;
        }

        const data = appData[dateStr];
        const dayLabel = data.title || (currentWorkoutPlan[data.dayType] ? currentWorkoutPlan[data.dayType].title : "未知计划");

        title.innerText = `📅 ${dateStr} - ${esc(dayLabel)}`;
        title.style.color = "#58a6ff";
        
        if (isRestDayLog(data)) {
            content.innerHTML = "<p>✅ 这一天，您选择了休息或进行了其他活动。</p>";
            if (data.note) content.innerHTML += `<p><strong>备注：</strong>${esc(data.note)}</p>`;
            return;
        }

        let html = `<p><strong>完成度：</strong><span style="color:var(--level-4)">${data.score}%</span></p>`;
        if (data.note) html += `<p><strong>备注：</strong>${esc(data.note)}</p>`;
        html += '<hr style="border-color:var(--border-color); margin: 15px 0;">';

        data.exercises.forEach(ex => {
            html += `<div style="margin-bottom: 12px;">
                        <strong>${esc(ex.name)}</strong> (${ex.completedSets}/${ex.targetSets} 组)
                        <div style="margin-top: 4px;">`;
            if(ex.completedSets === 0) {
                html += `<span class="playback-set" style="color:var(--danger)">未执行</span>`;
            } else {
                ex.setsData.forEach((set, idx) => {
                    if(set.weight !== '' || set.reps !== '') {
                        const w = set.weight ? `${esc(set.weight)}kg` : `自重`;
                        const r = set.reps ? `${esc(set.reps)}次` : `?次`;
                        html += `<span class="playback-set">[第${idx+1}组] ${w} x ${r}</span><br>`;
                    }
                });
            }
            html += `</div></div>`;
        });

        content.innerHTML = html;
        pbArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function renderTrendChart(year) {
        const chart = document.getElementById('trend-chart');
        chart.innerHTML = '';
        const monthData = new Array(12).fill(0);
        Object.keys(appData).forEach(date => {
            const data = appData[date];
            if(date.startsWith(year) && !isRestDayLog(data) && data.score > 0) {
                const month = parseInt(date.split('-')[1]) - 1;
                monthData[month]++;
            }
        });
        const maxDays = 25; 
        monthData.forEach((days, idx) => {
            const height = Math.min((days / maxDays) * 100, 100);
            chart.innerHTML += `
                <div class="bar-container">
                    <div class="bar" style="height: ${height}%" data-val="${days}天"></div>
                    <div class="month-label">${idx + 1}月</div>
                </div>
            `;
        });
    }

    function generateAnalysis(year) {
        const aiDiv = document.getElementById('ai-analysis');
        let workoutDays = 0, totalScore = 0;
        Object.keys(appData).forEach(d => {
            const data = appData[d];
            if(d.startsWith(year) && !isRestDayLog(data) && data.score > 0) {
                workoutDays++; totalScore += data.score;
            }
        });
        if(workoutDays === 0) { aiDiv.innerHTML = "<p>今年还没有训练记录，开始您的第一次打卡吧。</p>"; return; }
        const avgScore = Math.round(totalScore / workoutDays);
        aiDiv.innerHTML = `<div class="analysis-box">
            <strong>${esc(year)}年数据总览：</strong><br>
            全年有效训练 (不含纯休息日)：<span style="color:var(--accent); font-size:1.2em; font-weight:bold">${workoutDays}</span> 天<br>
            平均计划完成度：<span style="color:var(--accent); font-size:1.2em; font-weight:bold">${avgScore}%</span>
        </div>`;
    }

    // ==========================================
    // 8. 导入与导出模块
    // ==========================================
    function exportJSON() {
        const exportPackage = {
            logs: appData,
            customPlan: currentWorkoutPlan 
        };
        const dataStr = JSON.stringify(exportPackage, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Workout_Backup_${toLocalDateStr()}.json`;
        a.click(); URL.revokeObjectURL(url);
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported.logs && imported.customPlan) {
                    appData = imported.logs;
                    currentWorkoutPlan = imported.customPlan;
                    await dbSet('logs', appData);
                    await dbSet('plan', currentWorkoutPlan);
                    alert("✅ 数据导入成功！"); 
                    location.reload();
                } else {
                    alert("❌ 文件格式不兼容，无法解析。");
                }
            } catch (err) { alert("❌ 文件读取失败，请检查文件是否损坏。"); }
        };
        reader.readAsText(file);
    }

    async function clearData() {
        if(confirm("⚠️ 此操作不可逆！\n如果您没有导出备份，所有记录和计划将被彻底删除。\n确认清空吗？")) {
            await dbClear(); 
            location.reload();
        }
    }
</script>
