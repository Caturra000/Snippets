<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruce的硬核训练日志</title>
    <style>
        html { scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar { display: none; }
        
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --accent: #238636;
            --accent-hover: #2ea043;
            --danger: #da3633;
            --quick-fill: #dba61f;
            --level-0: #161b22;
            --level-1: #0e4429;
            --level-2: #006d32;
            --level-3: #26a641;
            --level-4: #39d353;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px 10px; display: flex; justify-content: center; line-height: 1.5; }
        .container { max-width: 800px; width: 100%; box-sizing: border-box; }
        
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .tabs { display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 20px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        .tab:hover { color: var(--text-main); }
        .tab.active { color: var(--text-main); border-bottom-color: #f78166; }

        .panel { display: none; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 20px; box-sizing: border-box; }
        .panel.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        select, input[type="date"], input[type="text"], input[type="number"] { background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px; border-radius: 4px; box-sizing: border-box; }
        select { width: 100%; margin-bottom: 15px; font-size: 1em; cursor: pointer; }
        button { background-color: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: var(--accent-hover); }
        .btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-quick { background-color: rgba(219, 166, 31, 0.1); color: var(--quick-fill); border: 1px solid var(--quick-fill); padding: 4px 8px; border-radius: 4px; font-size: 0.8em; margin-left: auto; }
        .btn-quick:hover { background-color: var(--quick-fill); color: #000; }
        .btn-danger { background-color: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 4px 8px; font-size: 0.8em;}
        .btn-danger:hover { background-color: var(--danger); color: white; }

        .exercise-item { border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; margin-bottom: 15px; background: #0d1117; }
        .exercise-header { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; }
        .exercise-title { font-weight: bold; font-size: 1.1em; color: #58a6ff; }
        .exercise-target { font-size: 0.9em; color: var(--text-muted); }
        .bruce-tip { font-size: 0.85em; color: #d2a8ff; font-style: italic; margin-bottom: 12px; }
        .sets-container { display: flex; flex-direction: column; gap: 10px; }
        .set-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .set-label { width: 50px; font-size: 0.9em; color: var(--text-muted); }
        .set-input { width: 80px; text-align: center; flex-grow: 1; max-width: 100px; }
        .set-unit { color: var(--text-muted); font-size: 0.9em; }
        .rest-day-check { display: flex; align-items: center; gap: 10px; font-size: 1.1em; cursor: pointer; user-select: none; }

        .edit-meta-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; margin-bottom: 20px; }
        .edit-card { border: 1px solid var(--border-color); background: #0d1117; border-radius: 6px; padding: 15px; margin-bottom: 15px; position: relative;}
        .edit-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; flex-wrap: wrap;}
        .edit-row label { display: flex; align-items: center; gap: 5px; font-size: 0.9em; cursor: pointer; color: var(--text-main);}
        .edit-card input[type="text"] { flex: 1; min-width: 150px;}

        .year-selector { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; scrollbar-width: none; }
        .year-selector::-webkit-scrollbar { display: none; }
        .year-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 6px 12px; border-radius: 4px; font-size: 1em; }
        .year-btn.active { background: var(--accent); color: white; }
        
        .heatmap-wrapper { overflow-x: auto; padding-bottom: 15px; scrollbar-width: thin; scrollbar-color: var(--border-color) transparent; }
        .heatmap-wrapper::-webkit-scrollbar { height: 8px; display: block; } 
        .heatmap-wrapper::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 4px; }
        .heatmap-grid { position: relative; display: grid; grid-template-rows: repeat(7, 14px); grid-auto-flow: column; gap: 4px; width: max-content; }
        .cell { width: 14px; height: 14px; border-radius: 3px; background-color: var(--level-0); border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.1s; }
        .cell[data-level="1"] { background-color: var(--level-1); }
        .cell[data-level="2"] { background-color: var(--level-2); }
        .cell[data-level="3"] { background-color: var(--level-3); }
        .cell[data-level="4"] { background-color: var(--level-4); }
        .cell:hover { border-color: #fff; transform: scale(1.2); }

        .global-tooltip { position: fixed; background: rgba(0, 0, 0, 0.9); color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 12px; pointer-events: none; z-index: 9999; opacity: 0; transition: opacity 0.15s; white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }

        .playback-box { background: #0d1117; border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; margin-top: 20px; display: none; }
        .playback-set { font-size: 0.9em; color: var(--text-muted); margin-left: 15px; }
        .trend-chart { display: flex; align-items: flex-end; gap: 8px; height: 150px; margin-top: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .bar-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
        .bar { width: 100%; max-width: 35px; background-color: var(--accent); border-radius: 3px 3px 0 0; transition: height 0.5s; position: relative; }
        .bar:hover::after { content: attr(data-val); position: absolute; top: -25px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 2px 6px; border-radius: 3px; font-size: 12px; font-weight: bold; z-index: 2;}
        .month-label { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
        .analysis-box { background: rgba(35, 134, 54, 0.1); border-left: 4px solid var(--accent); padding: 15px; margin-top: 20px; border-radius: 4px; }
        .warning-box { border-left-color: var(--danger); background: rgba(218, 54, 51, 0.1); }

        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; align-items: center; justify-content: center; z-index: 10000; font-size: 1.2em; font-weight: bold; color: var(--accent); transition: opacity 0.3s; }

        @media (max-width: 600px) {
            .set-row { justify-content: space-between; }
            .set-input { width: 30%; flex-grow: 0; }
            .btn-quick { width: 100%; text-align: center; margin-top: 5px; margin-left: 0; }
            .panel { padding: 15px 10px; }
        }
    </style>
</head>
<body>

<div id="loading-screen">加载训练数据...</div>
<div id="global-tooltip" class="global-tooltip"></div>

<div class="container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('today', this)">📝 今日打卡</div>
        <div class="tab" onclick="switchTab('stats', this)">📊 统计与回放</div>
        <div class="tab" onclick="switchTab('edit', this)">⚙️ 计划定制</div>
        <div class="tab" onclick="switchTab('data', this)">💾 数据管理</div>
    </div>

    <div id="today" class="panel active">
        <h2>🔥 今天的战斗容量</h2>
        <input type="date" id="date-picker" style="margin-bottom: 15px; width: auto;">
        
        <select id="day-selector" onchange="loadDayPlan()"></select>

        <div id="exercise-list"></div>
        <input type="text" id="daily-note" placeholder="今日总体备注 (状态、饮食等，选填)" style="width:100%; margin-top:15px; display:none;">
        <button id="save-btn" style="display: none; width: 100%; margin-top: 20px; font-size: 1.1em;" onclick="saveDailyLog()">保存今日容量</button>
        <div id="daily-feedback" style="margin-top: 15px;"></div>
    </div>

    <div id="stats" class="panel">
        <div class="year-selector" id="year-tabs"></div>
        <div class="heatmap-wrapper" id="heatmap-scroll-area">
            <div class="heatmap-grid" id="heatmap"></div>
        </div>
        <div id="playback-area" class="playback-box">
            <h3 id="pb-title" style="margin-top:0; color:#58a6ff;">点击上方的方块查看记录</h3>
            <div id="pb-content"></div>
        </div>
        <h3 style="margin-top: 30px;">📈 训练频次趋势 (月度)</h3>
        <div class="trend-chart" id="trend-chart"></div>
        <h3 style="margin-top: 30px;">近期评估：</h3>
        <div id="ai-analysis">加载中...</div>
    </div>

    <div id="edit" class="panel">
        <h2>⚙️ 训练矩阵定制</h2>
        <p style="color:var(--text-muted); font-size:0.9em;">完全重塑你的分化表。修改此处<b>不影响</b>过去的历史打卡快照。</p>
        <p style="color:var(--text-muted); font-size:0.85em; margin-top:-8px;">提示：只是改动作名会默认保留历史重量继承；如果你想把它视为全新动作，请删除旧动作后重新新增。</p>
        
        <select id="edit-day-selector" onchange="loadEditPlan()"></select>

        <div class="edit-meta-box">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap;">
                <span style="white-space:nowrap; color: var(--text-muted);">本计划名:</span>
                <input type="text" id="ed-day-title" style="font-weight:bold; font-size:1.1em; max-width: 300px;">
            </div>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--accent);">
                <input type="checkbox" id="ed-day-isrest" onchange="toggleEditRestDay()" style="width:18px;height:18px; accent-color: var(--accent);">
                <b>将这一天设为【休息日 / 有氧日】(不记录容量)</b>
            </label>
        </div>

        <div id="edit-exercise-wrapper">
            <div id="edit-exercise-list"></div>
            <button class="btn-outline" style="width: 100%; margin-top: 10px; border-style: dashed;" onclick="addExerciseToEdit()">+ 新增动作</button>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 25px; flex-wrap: wrap;">
            <button style="flex: 2; min-width: 200px;" onclick="saveCustomPlan()">💾 保存这天的设置</button>
            <button style="flex: 1; min-width: 150px; background: transparent; border: 1px solid var(--danger); color: var(--danger);" onclick="restoreDefaultPlan()">🔄 恢复默认出厂</button>
        </div>
        <div id="edit-feedback" style="margin-top: 15px; color: var(--level-4); font-weight: bold;"></div>
    </div>

    <div id="data" class="panel">
        <h2>💾 数据存档与迁移</h2>
        <p style="color: var(--text-muted); font-size: 0.9em;">数据存储在本地。为了防止清理浏览器缓存导致丢失，请定期导出完整数据备份。</p>
        <button onclick="exportJSON()">📥 导出完整数据 (JSON)</button>
        <div style="margin-top: 20px;">
            <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
            <button class="btn-outline" onclick="document.getElementById('import-file').click()">📤 导入恢复数据 (JSON)</button>
        </div>
        <button class="btn-outline" style="color: var(--danger); border-color: var(--danger); margin-top: 40px;" onclick="clearData()">⚠️ 清空本地所有数据</button>
    </div>
</div>

<script>
    const DB_NAME = 'HardcoreLogDB';
    const STORE_NAME = 'store';
    let dbPromise = null;

    function openDB() {
        if (dbPromise) return dbPromise;
        dbPromise = new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME);
                }
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => {
                dbPromise = null;
                reject(req.error);
            };
        });
        return dbPromise;
    }

    async function dbGet(key) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            tx.onerror = () => reject(tx.error);
            tx.onabort = () => reject(tx.error);
            const req = tx.objectStore(STORE_NAME).get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    async function dbSet(key, value) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
            tx.onabort = () => reject(tx.error);
            const store = tx.objectStore(STORE_NAME);
            if (value === null) store.delete(key);
            else store.put(value, key);
        });
    }

    function esc(s) {
        if (s === null || s === undefined) return "";
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function deepClone(obj) {
        return JSON.parse(JSON.stringify(obj));
    }

    function toLocalDateStr(dateObj) {
        const d = dateObj || new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function inferMeasureType(repsDesc) {
        const s = String(repsDesc || '').trim();
        if (!s) return 'reps';
        if (s.includes('力竭')) return 'amrap';
        if (/[秒分]/.test(s)) return 'time';
        return 'reps';
    }

    function parseTargetValue(repsDesc) {
        const type = inferMeasureType(repsDesc);
        if (type !== 'reps') return '';
        const matches = String(repsDesc || '').match(/\d+/g);
        return matches ? matches[matches.length - 1] : '';
    }

    function isRestDayLog(data) {
        if (!data) return false;
        if (typeof data.isRest === 'boolean') return data.isRest;
        return Array.isArray(data.exercises) && data.exercises.length === 0;
    }

    function hasSetActivity(w, r) {
        const weightVal = String(w ?? '').trim();
        const repsVal = String(r ?? '').trim();
        return repsVal !== '' || (weightVal !== '' && weightVal !== '0');
    }

    const defaultWorkoutPlan = {
        "day1": { title: "Day 1：推 A", isRest: false, exercises: [
            { id: "d1e1", name: "站姿杠铃推肩", sets: 4, repsDesc: "6-8次", tip: "全身绷紧，腿夹臀。若clean技术不行，改大重量坐姿哑铃推肩。", isCore: true },
            { id: "d1e2", name: "上斜哑铃卧推", sets: 3, repsDesc: "8-10次", tip: "肩部优先时胸部辅助即可。感受肌肉的收缩。", isCore: false },
            { id: "d1e3", name: "哑铃地板卧推", sets: 3, repsDesc: "10-12次", tip: "无牵张反射，纯肌肉力量启动。顶端抗阻才是王道，扔掉垃圾飞鸟动作。", isCore: false },
            { id: "d1e4", name: "倾斜哑铃侧平举", sets: 4, repsDesc: "12-15次", tip: "一手扶墙身体外倾，底端即受力。慢上2秒慢下3秒，榨干每一丝纤维。", isCore: false },
            { id: "d1e5", name: "哑铃碎颅者", sets: 3, repsDesc: "10-12次", tip: "起止点在脑袋后方，保持三头扭矩。三头长头首选，用你的最大重量。", isCore: false },
            { id: "d1e6", name: "哑铃保加利亚分腿蹲", sets: 3, repsDesc: "10-12次", tip: "无需深蹲架，股四和臀部的极强刺激。咬紧牙关，撑过去。", isCore: true }
        ]},
        "day2": { title: "Day 2：拉 A", isRest: false, exercises: [
            { id: "d2e1", name: "宽握硬拉", sets: 3, repsDesc: "6-8次", tip: "今日主角！使用助力带和腰带，腰椎全程中立。6-8次兼顾力量和肌肥大。", isCore: true },
            { id: "d2e2", name: "负重正手引体向上", sets: 4, repsDesc: "5-8次", tip: "不用助力带。含肩胛下压，身体微倾。背部的绝对王者。", isCore: true },
            { id: "d2e3", name: "杠铃划船", sets: 3, repsDesc: "8-10次", tip: "背部力量远大于握力，必须用助力带，别让小臂限制了你的背部刺激。", isCore: false },
            { id: "d2e4", name: "俯身哑铃飞鸟", sets: 3, repsDesc: "12-15次", tip: "顶端有意识做肩外旋。外旋是后束主要功能之一，雕刻细节。", isCore: false },
            { id: "d2e5", name: "杠铃弯举 (EZ杆)", sets: 3, repsDesc: "8-10次", tip: "身体不摇晃才是技术力竭的标准，严格控制离心。", isCore: false },
            { id: "d2e6", name: "哑铃锤式弯举", sets: 3, repsDesc: "10-12次", tip: "对握持铃，主攻肱肌和肱桡肌，让手臂更有立体感。", isCore: false }
        ]},
        "day3": { title: "Day 3：休息", isRest: true, exercises: [] },
        "day4": { title: "Day 4：推 B", isRest: false, exercises: [
            { id: "d4e1", name: "哑铃卧推", sets: 4, repsDesc: "8-10次", tip: "全程控制触胸。推不起来时翻转至身侧放下，安全第一。", isCore: false },
            { id: "d4e2", name: "坐姿哑铃推肩 (对握)", sets: 3, repsDesc: "10-12次", tip: "对握是对肩关节压力最小的握法。中等重量慢速控制，下至耳朵下方。", isCore: false },
            { id: "d4e3", name: "吕小军飞鸟", sets: 3, repsDesc: "力竭", tip: "全程离心收缩最长，兼顾中束增肌与肩袖健康。用轻重量感受极致控制。", isCore: false },
            { id: "d4e4", name: "单臂哑铃颈后臂屈伸", sets: 3, repsDesc: "10-12次", tip: "单臂行程更大，切记肩部不要借力，孤立刺激。", isCore: false },
            { id: "d4e5", name: "窄距俯卧撑", sets: 2, repsDesc: "力竭", tip: "科学证明，窄距对三头和胸大肌的刺激均强于宽距。做到起不来为止。", isCore: false },
            { id: "d4e6", name: "哑铃行走弓步", sets: 3, repsDesc: "10-12次", tip: "与保加利亚蹲交替，确保股四的每周容量。迈开大步，稳住核心。", isCore: true }
        ]},
        "day5": { title: "Day 5：拉 B", isRest: false, exercises: [
            { id: "d5e1", name: "反手引体向上", sets: 3, repsDesc: "8-12次", tip: "二头最好的复合动作。不用助力带。可负重或自重高次数。", isCore: true },
            { id: "d5e2", name: "哑铃RDL", sets: 3, repsDesc: "12-15次", tip: "较轻重量高次数，与传统硬拉形成轻重互补。注意髋铰链的发力。", isCore: true },
            { id: "d5e3", name: "上斜哑铃划船", sets: 3, repsDesc: "10-12次", tip: "胸靠椅面，完全消除脊柱负荷，在RDL之后纯粹地孤立背阔肌。", isCore: false },
            { id: "d5e4", name: "上斜哑铃弯举", sets: 3, repsDesc: "10-12次", tip: "底端拉伸极强，底端拉伸更长的弯举增粗更多。控制下放。", isCore: false },
            { id: "d5e5", name: "哑铃腕弯举", sets: 2, repsDesc: "15-20次", tip: "站姿垂于身侧，下降到指尖增加行程，榨干小臂。", isCore: false },

    function normalizePlan(plan) {
        const merged = deepClone(defaultWorkoutPlan);
        if (!plan || typeof plan !== 'object' || Array.isArray(plan)) return merged;

        for (let i = 1; i <= 7; i++) {
            const k = 'day' + i;
            const src = plan[k];
            if (!src || typeof src !== 'object' || Array.isArray(src)) continue;

            merged[k].title = (typeof src.title === 'string' && src.title.trim()) ? src.title.trim() : merged[k].title;
            merged[k].isRest = !!src.isRest;

            if (Array.isArray(src.exercises)) {
                merged[k].exercises = src.exercises.map((ex, idx) => {
                    const exObj = (ex && typeof ex === 'object' && !Array.isArray(ex)) ? ex : {};
                    return {
                        id: (typeof exObj.id === 'string' && exObj.id.trim()) ? exObj.id.trim() : `${k}_ex_${idx + 1}`,
                        name: (typeof exObj.name === 'string' && exObj.name.trim()) ? exObj.name.trim() : `动作 ${idx + 1}`,
                        sets: Math.min(20, Math.max(1, parseInt(exObj.sets, 10) || 1)),
                        repsDesc: (typeof exObj.repsDesc === 'string' && exObj.repsDesc.trim()) ? exObj.repsDesc.trim() : '力竭',
                        tip: typeof exObj.tip === 'string' ? exObj.tip : '',
                        isCore: !!exObj.isCore
                    };
                });
            }
        }
        return merged;
    }

    function normalizeLogs(logs) {
        if (!logs || typeof logs !== 'object' || Array.isArray(logs)) return {};
        const out = {};
        for (const [date, value] of Object.entries(logs)) {
            if (/^\d{4}-\d{2}-\d{2}$/.test(date) && value && typeof value === 'object' && !Array.isArray(value)) {
                out[date] = value;
            }
        }
        return out;
    }

    function getPlanExercise(dayType, exId) {
        const dayPlan = currentWorkoutPlan[dayType];
        if (!dayPlan || !Array.isArray(dayPlan.exercises)) return null;
        return dayPlan.exercises.find(ex => ex.id === exId) || null;
    }

    function getPlanTitleFromData(data) {
        if (!data) return '未知计划';
        return data.title || (currentWorkoutPlan[data.dayType] ? currentWorkoutPlan[data.dayType].title : '未知计划');
    }

    function buildRenderedPlan(day, savedData) {
        const livePlan = deepClone(currentWorkoutPlan[day] || defaultWorkoutPlan[day] || { title: '未知计划', isRest: false, exercises: [] });

        if (!savedData || savedData.dayType !== day) return livePlan;

        if (isRestDayLog(savedData)) {
            return {
                title: savedData.title || livePlan.title,
                isRest: true,
                exercises: []
            };
        }

        if (Array.isArray(savedData.exercises) && savedData.exercises.length > 0) {
            return {
                title: savedData.title || livePlan.title,
                isRest: false,
                exercises: savedData.exercises.map((ex, idx) => {
                    const matched = getPlanExercise(day, ex.id) || {};
                    const setsFromLog = parseInt(ex.targetSets, 10) || (Array.isArray(ex.weights) ? Math.max(ex.weights.length, (ex.reps || []).length) : 0) || parseInt(matched.sets, 10) || 1;
                    return {
                        id: ex.id || `legacy_${day}_${idx + 1}`,
                        name: ex.name || matched.name || `动作 ${idx + 1}`,
                        sets: setsFromLog,
                        repsDesc: matched.repsDesc || '',
                        measureType: ex.measureType || matched.measureType || inferMeasureType(matched.repsDesc),
                        tip: matched.tip || '',
                        isCore: typeof matched.isCore === 'boolean' ? matched.isCore : false
                    };
                })
            };
        }

        return livePlan;
    }

        const dates = Object.keys(appData).filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d)).sort().reverse();

        for (const d of dates) {

            const data = appData[d];
            if (!Array.isArray(data.exercises)) continue;
            const ex = data.exercises.find(e => e.id === exId);
            if (ex && Array.isArray(ex.weights) && ex.weights[setIndex] !== undefined && ex.weights[setIndex] !== null) {
                return ex.weights[setIndex];
            }
        }
        return '';
    }

    async function saveDailyLog() {
        const dayType = document.getElementById('day-selector').value;
        if (!dayType || !currentWorkoutPlan[dayType]) return;

        const date = document.getElementById('date-picker').value;
        const note = document.getElementById('daily-note').value;
        const renderedPlan = currentRenderedPlan || buildRenderedPlan(dayType, null);
        const dayTitle = renderedPlan.title || currentWorkoutPlan[dayType].title || '未知计划';

        if (renderedPlan.isRest) {
            const done = document.getElementById('rest-check').checked;
            appData[date] = {
                dayType,
                title: dayTitle,
                isRest: true,
                score: done ? 100 : 0,
                note,
                exercises: []
            };
        } else {
            const items = document.querySelectorAll('.exercise-item');
            const feedbackDiv = document.getElementById('daily-feedback');

            if (items.length === 0) {
                feedbackDiv.innerHTML = `<div class="analysis-box warning-box">当前计划没有动作，请先去“计划定制”里补充动作后再保存。</div>`;
                return;
            }

            let targetTotalSets = 0;
            let completedTotalSets = 0;
            let coreMissedName = "";
            let logs = [];

            items.forEach(item => {
                const id = item.getAttribute('data-id');
                const isCore = item.getAttribute('data-core') === 'true';
                const totalSets = parseInt(item.getAttribute('data-total-sets'), 10) || 1;
                const measureType = item.getAttribute('data-measure') || 'reps';
                const name = item.querySelector('.exercise-title').innerText.replace('🔥', '').trim();

                targetTotalSets += totalSets;
                
                let weights = [];
                let reps = [];
                let setsDoneForThisEx = 0;
                let lastActiveIndex = -1;

                const wInputs = item.querySelectorAll('.set-w');
                const rInputs = item.querySelectorAll('.set-r');

                for (let i = 0; i < totalSets; i++) {
                    const w = wInputs[i].value;
                    const r = rInputs[i].value;
                    weights.push(w);
                    reps.push(r);
                    if (hasSetActivity(w, r)) {
                        setsDoneForThisEx++;
                        completedTotalSets++;
                        lastActiveIndex = i;
                    }
                }

                weights = weights.slice(0, lastActiveIndex + 1);
                reps = reps.slice(0, lastActiveIndex + 1);

                logs.push({
                    id,
                    name,
                    measureType,
                    weights,
                    reps,
                    targetSets: totalSets,
                    completedSets: setsDoneForThisEx
                });

                if (isCore && setsDoneForThisEx === 0) coreMissedName = name;
            });

            const score = targetTotalSets === 0 ? 0 : Math.round((completedTotalSets / targetTotalSets) * 100);
            appData[date] = {
                dayType,
                title: dayTitle,
                isRest: false,
                score,
                note,
                exercises: logs,
                coreMissed: coreMissedName !== ""
            };
        }

        await dbSet('appData_logs', appData);
        showFeedback(date);

        const btn = document.getElementById('save-btn');
        const oldTxt = btn.innerText;
        btn.innerText = "✅ 数据已保存";
        btn.style.backgroundColor = "var(--level-4)";
        setTimeout(() => {
            btn.innerText = oldTxt;
            btn.style.backgroundColor = "var(--accent)";
        }, 2000);
    }

    function showFeedback(date) {
        const data = appData[date];
        const feedbackDiv = document.getElementById('daily-feedback');
        if (!data) {
            feedbackDiv.innerHTML = '';
            return;
        }

        let fbHtml = "";
        if (isRestDayLog(data)) {
            if (data.score === 100) {
                fbHtml = `<div class="analysis-box">Bruce: “很好的执行力，休息也是计划的一部分。”</div>`;
            } else {
                fbHtml = `<div class="analysis-box warning-box">Bruce: “这天被设成了休息/有氧日，但你还没勾选完成。恢复也要认真对待。”</div>`;
            }
        } else if (data.score === 0) {
            fbHtml = `<div class="analysis-box warning-box">Bruce: “记录保存了，但今天没有完成任何有效组。下次别让空表格赢了你。”</div>`;
        } else if (data.coreMissed) {
            fbHtml = `<div class="analysis-box warning-box">Bruce: “嘿！你居然跳过了核心动作？容量再高，没有地基刺激，激素水平也上不去！”</div>`;
        } else if (data.score === 100) {
            fbHtml = `<div class="analysis-box">Bruce: “完美！所有的组都吃下了。去补充碳水吧！”</div>`;
        } else if (data.score >= 60) {
            fbHtml = `<div class="analysis-box">Bruce: “完成了 ${data.score}% 的容量。留得青山在，下次试着补齐。”</div>`;
        } else {
            fbHtml = `<div class="analysis-box warning-box">Bruce: “只完成了不到一半？不要让数字欺骗你，要对得起你流的汗。”</div>`;
        }
        feedbackDiv.innerHTML = fbHtml;
    }

    function showTooltipNearCell(cell, text) {
        const tooltip = document.getElementById('global-tooltip');
        tooltip.innerText = text;
        tooltip.style.opacity = '1';

        requestAnimationFrame(() => {
            const rect = cell.getBoundingClientRect();
            let left = rect.left + (rect.width / 2) - (tooltip.offsetWidth / 2);
            let top = rect.top - tooltip.offsetHeight - 8;

            left = Math.max(8, Math.min(left, window.innerWidth - tooltip.offsetWidth - 8));
            if (top < 8) top = rect.bottom + 8;

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        });
    }

    function renderStats(year) {
        const heatmap = document.getElementById('heatmap');
        heatmap.innerHTML = '';
        
        const startDate = new Date(Number(year), 0, 1);
        const endDate = new Date(Number(year), 11, 31);
        const startDayOfWeek = startDate.getDay();

        for (let i = 0; i < startDayOfWeek; i++) {
            const empty = document.createElement('div');
            empty.className = 'cell';
            empty.style.visibility = 'hidden';
            heatmap.appendChild(empty);
        }

        let d = new Date(startDate);
        while (d <= endDate) {
            const dateStr = toLocalDateStr(d);
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.setAttribute('data-date', dateStr); 
            
            let level = 0;
            let info = dateStr + " - 无记录";
            
            if (appData[dateStr]) {
                const data = appData[dateStr];
                const score = Number(data.score) || 0;
                const titleStr = getPlanTitleFromData(data);
                
                if (isRestDayLog(data)) {
                    level = score > 0 ? 1 : 0;
                    info = score > 0
                        ? `${dateStr} - [休息/有氧] ${titleStr}`
                        : `${dateStr} - [休息/有氧未确认] ${titleStr}`;
                } else {
                    if (score === 100) level = 4;
                    else if (score >= 75) level = 3;
                    else if (score >= 40) level = 2;
                    else if (score > 0) level = 1;
                    else level = 0;

                    info = `${dateStr} - ${titleStr} (${score}%)`;
                }
            }
            
            cell.setAttribute('data-level', level);
            cell.addEventListener('mouseenter', () => showTooltipNearCell(cell, info));
            cell.addEventListener('mouseleave', () => {
                document.getElementById('global-tooltip').style.opacity = '0';
            });
            cell.addEventListener('touchstart', function() {
                showTooltipNearCell(cell, info);
            }, { passive: true });
            cell.addEventListener('touchend', function() {
                setTimeout(() => {
                    document.getElementById('global-tooltip').style.opacity = '0';
                }, 1500);
            });
            cell.onclick = () => showPlayback(dateStr);
            heatmap.appendChild(cell);
            
            d.setDate(d.getDate() + 1);
        }

        setTimeout(() => {
            const wrapper = document.getElementById('heatmap-scroll-area');
            let targetCell = document.querySelector(`.cell[data-date="${todayStr}"]`);
            if (!targetCell) {
                const allCells = document.querySelectorAll('.cell[data-date]');
                targetCell = allCells[allCells.length - 1];
            }
            if (targetCell) {
                const centerPos = targetCell.offsetLeft - (wrapper.clientWidth / 2) + (targetCell.clientWidth / 2);
                wrapper.scrollTo({ left: centerPos, behavior: 'smooth' });
            }
        }, 150);

        renderTrendChart(year);
        generateAnalysis(year);
    }

    function showPlayback(dateStr) {
        const pbArea = document.getElementById('playback-area');
        const title = document.getElementById('pb-title');
        const content = document.getElementById('pb-content');
        
        pbArea.style.display = 'block';
        
        if (!appData[dateStr]) {
            title.innerText = `📅 ${dateStr} - 无记录`;
            title.style.color = "var(--text-muted)";
            content.innerHTML = "<p>这一天像风一样消散了，什么都没留下。</p>";
            return;
        }

        const data = appData[dateStr];
        const dayLabel = getPlanTitleFromData(data);

        title.innerText = `📅 ${dateStr} - ${dayLabel}`;
        title.style.color = "#58a6ff";
        
        if (isRestDayLog(data)) {
            content.innerHTML = data.score > 0
                ? "<p>✅ 这一天，你选择了休息或有氧，让身体进行恢复。</p>"
                : "<p>🕒 这一天被标记为休息/有氧日，但你还没有勾选完成。</p>";
            if (data.note) content.innerHTML += `<p><strong>备注：</strong>${esc(data.note)}</p>`;
            return;
        }

        const score = Number(data.score) || 0;
        let html = `<p><strong>容量完成度：</strong><span style="color:${score > 0 ? 'var(--level-4)' : 'var(--text-muted)'}">${score}%</span></p>`;
        if (score === 0) html += `<p style="color:var(--danger)">这次记录已保存，但没有完成任何有效组。</p>`;
        if (data.note) html += `<p><strong>备注：</strong>${esc(data.note)}</p>`;
        html += '<hr style="border-color:var(--border-color); margin: 15px 0;">';

        const exercises = Array.isArray(data.exercises) ? data.exercises : [];
        if (exercises.length === 0) {
            html += `<p>没有可回放的动作明细。</p>`;
        } else {
            exercises.forEach(ex => {
                const planEx = getPlanExercise(data.dayType, ex.id);
                const measureType = ex.measureType || inferMeasureType(ex.repsDesc || planEx?.repsDesc);
                const targetSets = parseInt(ex.targetSets, 10) || (Array.isArray(ex.weights) ? Math.max(ex.weights.length, (ex.reps || []).length) : (planEx ? planEx.sets : 0)) || 0;
                const completedSets = Number.isInteger(ex.completedSets) ? ex.completedSets : 
                    (Array.isArray(ex.weights) ? ex.weights.reduce((acc, w, i) => acc + (hasSetActivity(w, ex.reps && ex.reps[i]) ? 1 : 0), 0) : 0);

                html += `<div style="margin-bottom: 12px;">
                            <strong>${esc(ex.name || planEx?.name || '未命名动作')}</strong> (${completedSets}/${targetSets} 组)
                            <div style="margin-top: 4px;">`;

                if (completedSets === 0) {
                    html += `<span class="playback-set" style="color:var(--danger)">未执行</span>`;
                } else {
                    const maxLen = Math.max((ex.weights || []).length, (ex.reps || []).length);
                    for (let idx = 0; idx < maxLen; idx++) {
                        const wObj = (ex.weights && ex.weights[idx]) ?? '';
                        const rObj = (ex.reps && ex.reps[idx]) ?? '';
                        if (hasSetActivity(wObj, rObj)) {
                            const weightVal = String(wObj).trim();
                            const perfVal = String(rObj).trim();
                            const w = (weightVal !== '' && weightVal !== '0') ? `${esc(weightVal)}kg` : `自重`;
                            const p = perfVal !== '' ? `${esc(perfVal)}${measureType === 'time' ? '秒' : '次'}` : (measureType === 'time' ? '?秒' : '?次');
                            html += `<span class="playback-set">[第${idx + 1}组] ${w} x ${p}</span><br>`;
                        }
                    }
                }
                html += `</div></div>`;
            });
        }

        content.innerHTML = html;
        pbArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function renderTrendChart(year) {
        const chart = document.getElementById('trend-chart');
        chart.innerHTML = '';
        const monthData = new Array(12).fill(0);

        Object.keys(appData).forEach(date => {
            const data = appData[date];
            if (date.startsWith(year) && !isRestDayLog(data) && (Number(data.score) || 0) > 0) {
                const month = parseInt(date.split('-')[1], 10) - 1;
                monthData[month]++;
            }
        });

        const maxDays = Math.max(1, ...monthData);
        monthData.forEach((days, idx) => {
            const height = days === 0 ? 0 : (days / maxDays) * 100;
            chart.innerHTML += `
                <div class="bar-container">
                    <div class="bar" style="height: ${height}%" data-val="${days}天"></div>
                    <div class="month-label">${idx + 1}月</div>
                </div>
            `;
        });
    }

    function generateAnalysis(year) {
        const aiDiv = document.getElementById('ai-analysis');
        let workoutDays = 0, totalScore = 0;

        Object.keys(appData).forEach(d => {
            const data = appData[d];
            if (d.startsWith(year) && !isRestDayLog(data) && (Number(data.score) || 0) > 0) {
                workoutDays++;
                totalScore += Number(data.score) || 0;
            }
        });

        if (workoutDays === 0) {
            aiDiv.innerHTML = `<p>${esc(year)}年还没有容量记录。种一棵树最好的时间是十年前，其次是现在。</p>`;
            return;
        }

        const avgScore = Math.round(totalScore / workoutDays);
        aiDiv.innerHTML = `<div class="analysis-box">
            <strong>${esc(year)}年数据总览：</strong><br>
            全年有效训练 (不含纯休息日)：<span style="color:var(--accent); font-size:1.2em; font-weight:bold">${workoutDays}</span> 天<br>
            平均容量完成度：<span style="color:var(--accent); font-size:1.2em; font-weight:bold">${avgScore}%</span>
        </div>`;
    }

    function exportJSON() {
        const cleanLogs = {};
        const sortedDates = Object.keys(appData)
            .filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d))
            .sort();

        for (const date of sortedDates) {
            const raw = appData[date];
            const entry = {};

            entry.dayType = raw.dayType;
            entry.title = raw.title;
            if (raw.isRest) entry.isRest = true;
            entry.score = raw.score;
            if (raw.note) entry.note = raw.note;

            if (Array.isArray(raw.exercises) && raw.exercises.length > 0) {
                entry.exercises = raw.exercises.map(ex => {
                    const cleaned = {};
                    cleaned.id = ex.id;
                    cleaned.name = ex.name;

                    if (ex.measureType && ex.measureType !== 'reps') {
                        cleaned.measureType = ex.measureType;
                    }

                    cleaned.targetSets = ex.targetSets;

                    if (Array.isArray(ex.weights) && ex.weights.length > 0) {
                        cleaned.weights = ex.weights.map(toNumOrNull);
                    }
                    if (Array.isArray(ex.reps) && ex.reps.length > 0) {
                        cleaned.reps = ex.reps.map(toNumOrNull);
                    }

                    return cleaned;
                });
            }

            cleanLogs[date] = entry;
        }

        const cleanPlan = {};
        for (let i = 1; i <= 7; i++) {
            const k = 'day' + i;
            const day = currentWorkoutPlan[k];
            if (!day) continue;

            const d = {};
            d.title = day.title;
            if (day.isRest) d.isRest = true;
            d.exercises = (day.exercises || []).map(ex => {
                const e = { id: ex.id, name: ex.name, sets: ex.sets, repsDesc: ex.repsDesc };
                if (ex.tip) e.tip = ex.tip;
                if (ex.isCore) e.isCore = true;
                return e;
            });

            cleanPlan[k] = d;
        }

        const exportPackage = {
            schemaVersion: 2,
            exportedAt: new Date().toISOString(),
            customPlan: cleanPlan,
            logs: cleanLogs
        };

        const dataStr = JSON.stringify(exportPackage, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `hardcore_log_${toLocalDateStr()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function toNumOrNull(v) {
        if (v === '' || v === null || v === undefined) return null;
        const n = Number(v);
        return isNaN(n) ? v : n;
    }

    function importJSON(event) {
        const fileInput = event.target;
        const file = fileInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                let importedLogs = {};
                let importedPlan = null;

                if (!imported || typeof imported !== 'object' || Array.isArray(imported)) {
                    throw new Error('Invalid JSON structure');
                }

                if ('logs' in imported || 'customPlan' in imported) {
                    importedLogs = normalizeLogs(imported.logs || {});
                    if (imported.customPlan) importedPlan = normalizePlan(imported.customPlan);
                } else {
                    importedLogs = normalizeLogs(imported);
                }

                if (!Object.keys(importedLogs).length && !importedPlan) {
                    throw new Error('No usable data');
                }

                appData = { ...appData, ...importedLogs };

                if (importedPlan) {
                    currentWorkoutPlan = importedPlan;
                    await dbSet('appData_plan', currentWorkoutPlan);
                }

                await dbSet('appData_logs', appData);
                fileInput.value = '';
                alert("✅ 数据导入成功！");
                location.reload();
            } catch (err) {
                console.error(err);
                fileInput.value = '';
                alert("❌ 文件格式错误或内容无效！");
            }
        };
        reader.readAsText(file);
    }

    async function clearData() {
        if (confirm("⚠️ 确定要清空？如果没有备份 JSON，数据将永远消失。")) {
            await dbSet('appData_logs', null);
            await dbSet('appData_plan', null);
            location.reload();
        }
    }
</script>
